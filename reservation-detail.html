<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservation Detail | Hotel Collection</title>
  <script>if(!localStorage.getItem("token"))window.location.replace("login.html");</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="shared-theme.css"/>
  <style>
    .floating label { background: white; }
    .modal-box .floating label { background: white; }
  </style>
</head>
<body>
<main class="max-w-3xl mx-auto px-6 py-10">
  <a href="reservations.html" class="inline-flex items-center gap-2 text-sm mb-6 transition" style="color:#64748b;">
    <i class="fa fa-arrow-left"></i> Back to Reservations
  </a>
  <div class="flex gap-3 mb-6">
    <button onclick="openEditModal()" class="btn-outline"><i class="fa fa-edit"></i> Edit Reservation</button>
  </div>
  <div id="content">
    <div class="space-y-5">
      <div class="skeleton h-8 w-64"></div>
      <div class="card p-6 space-y-3">
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-3/4"></div>
      </div>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay" onclick="closeEditOnOverlay(event)">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl" style="color:#1e293b;">Edit Reservation</h3>
      <button onclick="closeEditModal()" style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">x</button>
    </div>
    <div class="space-y-4">

      <p class="section-title">Booking Details</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="floating">
          <input class="input" id="e_bookingName" type="text" placeholder=" "/>
          <label>Booking Name *</label>
        </div>
        <div class="floating">
          <select class="input" id="e_nationality" onchange="this.classList.add('has-value')">
            <option value="" disabled selected hidden></option>
            <option>Afghan</option><option>Albanian</option><option>American</option><option>Argentine</option><option>Australian</option><option>Austrian</option><option>Bangladeshi</option><option>Belgian</option><option>Brazilian</option><option>British</option><option>Bulgarian</option><option>Canadian</option><option>Chilean</option><option>Chinese</option><option>Colombian</option><option>Czech</option><option>Danish</option><option>Dutch</option><option>Egyptian</option><option>Emirati</option><option>Ethiopian</option><option>Filipino</option><option>Finnish</option><option>French</option><option>German</option><option>Greek</option><option>Hungarian</option><option>Indian</option><option>Indonesian</option><option>Iranian</option><option>Irish</option><option>Israeli</option><option>Italian</option><option>Japanese</option><option>Jordanian</option><option>Kenyan</option><option>Korean</option><option>Kuwaiti</option><option>Lebanese</option><option>Malaysian</option><option>Maldivian</option><option>Mexican</option><option>Moroccan</option><option>Nepalese</option><option>New Zealander</option><option>Nigerian</option><option>Norwegian</option><option>Pakistani</option><option>Polish</option><option>Portuguese</option><option>Qatari</option><option>Romanian</option><option>Russian</option><option>Saudi</option><option>Singaporean</option><option>South African</option><option>Spanish</option><option>Sri Lankan</option><option>Swedish</option><option>Swiss</option><option>Thai</option><option>Turkish</option><option>Ukrainian</option><option>Vietnamese</option>
          </select>
          <label>Nationality</label>
        </div>
      </div>

      <p class="section-title mt-2">Number of Pax</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="floating"><input class="input" id="e_adults" type="number" placeholder=" " min="0"/><label>Adults</label></div>
        <div class="floating"><input class="input" id="e_childWithBed" type="number" placeholder=" " min="0"/><label>Child with Bed</label></div>
        <div class="floating"><input class="input" id="e_childWithoutBed" type="number" placeholder=" " min="0"/><label>Child without Bed (6-10)</label></div>
        <div class="floating"><input class="input" id="e_childBelow5" type="number" placeholder=" " min="0"/><label>Child below 5 yrs</label></div>
      </div>

      <p class="section-title mt-2">Room Details</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="floating"><input class="input" id="e_roomCategory" type="text" placeholder=" "/><label>Room Category</label></div>
        <div class="floating"><input class="input" id="e_noOfRooms" type="text" placeholder=" "/><label>No. of Rooms</label></div>
        <div class="floating">
          <select class="input" id="e_roomType" onchange="this.classList.add('has-value')">
            <option value="" disabled selected hidden></option>
            <option>Single Room</option><option>Double Room</option><option>Twin Room</option><option>Suite</option>
          </select>
          <label>Room Type</label>
        </div>
        <div class="floating"><input class="input" id="e_extraBed" type="number" placeholder=" " min="0"/><label>No. of Extra Bed</label></div>
        <div class="floating">
          <select class="input" id="e_mealPlan" onchange="this.classList.add('has-value')">
            <option value="" disabled selected hidden></option>
            <option>EP</option><option>CP</option><option>MAP</option><option>AP</option><option>JP</option>
          </select>
          <label>Meal Plan</label>
        </div>
      </div>

      <p class="section-title mt-2">Visit Details</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="floating"><input class="input" id="e_visit1in" type="date"/><label>1st Visit Check-In</label></div>
        <div class="floating"><input class="input" id="e_visit1out" type="date"/><label>1st Visit Check-Out</label></div>
        <div class="floating"><input class="input" id="e_visit2in" type="date"/><label>2nd Visit Check-In</label></div>
        <div class="floating"><input class="input" id="e_visit2out" type="date"/><label>2nd Visit Check-Out</label></div>
      </div>

      <p class="section-title mt-2">Note</p>
      <textarea class="input" id="e_note" placeholder="Additional notes..."></textarea>

      <div class="flex gap-3 pt-4">
        <button onclick="updateReservation()" class="btn-blue flex-1"><i class="fa fa-save"></i> Update</button>
        <button onclick="closeEditModal()" class="btn-outline flex-1">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
<script>
  const API = "http://localhost:5000/api/reservations";
  const id = new URLSearchParams(window.location.search).get("id");
  let currentReservation = null;

  async function loadReservation() {
    if (!id) { document.getElementById("content").innerHTML = `<p style="color:red;">No ID provided.</p>`; return; }
    try {
      const res = await fetch(`${API}/${id}`);
      const data = await res.json();
      if (data.success) { currentReservation = data.data; renderDetail(data.data); }
      else document.getElementById("content").innerHTML = `<p style="color:red;">${data.message}</p>`;
    } catch { document.getElementById("content").innerHTML = `<p style="color:red;">Failed to load.</p>`; }
  }

  function row(label, value) {
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value || "—"}</span></div>`;
  }

  function paxDisplay(pax) {
    const adults = Number(pax?.adults) || 0;
    const children = (Number(pax?.childWithBed)||0) + (Number(pax?.childWithoutBed)||0) + (Number(pax?.childBelow5)||0);
    return `${adults} Adult${adults !== 1 ? "s" : ""} / ${children} Child${children !== 1 ? "ren" : ""}`;
  }

  function renderDetail(r) {
    document.title = `${r.bookingName} | Reservation`;
    const date = new Date(r.createdAt).toLocaleDateString("en-GB", {day:"2-digit", month:"long", year:"numeric"});
    document.getElementById("content").innerHTML = `
      <div class="flex items-start justify-between mb-6">
        <div>
          <h2 class="text-3xl" style="color:#1e293b;">${r.bookingName}</h2>
          <p class="text-sm mt-1" style="color:#64748b;">Created on ${date}</p>
        </div>
        <span class="badge">${r.room?.mealPlan || "—"}</span>
      </div>

      <div class="card p-6 mb-5">
        <p class="section-title">Booking Details</p>
        ${row("Booking Name", `<span style="font-weight:600;">${r.bookingName}</span>`)}
        ${row("Nationality", r.nationality)}
      </div>

      <div class="card p-6 mb-5">
        <p class="section-title">Pax Details</p>
        ${row("Summary", `<span class="badge">${paxDisplay(r.pax)}</span>`)}
        ${row("Adults", r.pax?.adults)}
        ${row("Child with Bed", r.pax?.childWithBed)}
        ${row("Child without Bed (6-10 yrs)", r.pax?.childWithoutBed)}
        ${row("Child below 5 yrs", r.pax?.childBelow5)}
      </div>

      <div class="card p-6 mb-5">
        <p class="section-title">Room Details</p>
        ${row("Room Category", r.room?.category)}
        ${row("No. of Rooms", r.room?.noOfRooms)}
        ${row("Room Type", r.room?.type)}
        ${row("No. of Extra Bed", r.room?.extraBed)}
        ${row("Meal Plan", r.room?.mealPlan ? `<span class="badge">${r.room.mealPlan}</span>` : "—")}
      </div>

      <div class="card p-6 mb-5">
        <p class="section-title">Visit Details</p>
        ${row("1st Visit Check-In", r.visits?.visit1in)}
        ${row("1st Visit Check-Out", r.visits?.visit1out)}
        ${row("2nd Visit Check-In", r.visits?.visit2in)}
        ${row("2nd Visit Check-Out", r.visits?.visit2out)}
      </div>

      <div class="card p-6 mb-5">
        <p class="section-title">Email Details</p>
        ${row("Subject", r.subject)}
        ${row("Sent To", r.emailTo?.join(", "))}
      </div>

      ${r.note ? `
      <div class="card p-6 mb-5">
        <p class="section-title">Note</p>
        <p style="color:#64748b;font-size:0.9rem;line-height:1.6;">${r.note}</p>
      </div>` : ""}

      <a href="reservations.html" class="btn-blue"><i class="fa fa-arrow-left"></i> Back</a>
    `;
  }

  // ── Open Edit Modal ───────────────────────────
  function openEditModal() {
    if (!currentReservation) return;
    const r = currentReservation;

    document.getElementById("e_bookingName").value = r.bookingName || "";

    const natSel = document.getElementById("e_nationality");
    natSel.value = r.nationality || "";
    if (r.nationality) natSel.classList.add("has-value");

    document.getElementById("e_adults").value = r.pax?.adults || "";
    document.getElementById("e_childWithBed").value = r.pax?.childWithBed || "";
    document.getElementById("e_childWithoutBed").value = r.pax?.childWithoutBed || "";
    document.getElementById("e_childBelow5").value = r.pax?.childBelow5 || "";

    document.getElementById("e_roomCategory").value = r.room?.category || "";
    document.getElementById("e_noOfRooms").value = r.room?.noOfRooms || "";

    const roomTypeSel = document.getElementById("e_roomType");
    roomTypeSel.value = r.room?.type || "";
    if (r.room?.type) roomTypeSel.classList.add("has-value");

    document.getElementById("e_extraBed").value = r.room?.extraBed || "";

    const mealSel = document.getElementById("e_mealPlan");
    mealSel.value = r.room?.mealPlan || "";
    if (r.room?.mealPlan) mealSel.classList.add("has-value");

    document.getElementById("e_visit1in").value  = r.visits?.visit1in  !== "N/A" ? r.visits?.visit1in  || "" : "";
    document.getElementById("e_visit1out").value = r.visits?.visit1out !== "N/A" ? r.visits?.visit1out || "" : "";
    document.getElementById("e_visit2in").value  = r.visits?.visit2in  !== "N/A" ? r.visits?.visit2in  || "" : "";
    document.getElementById("e_visit2out").value = r.visits?.visit2out !== "N/A" ? r.visits?.visit2out || "" : "";

    document.getElementById("e_note").value = r.note || "";

    document.getElementById("editModal").classList.add("active");
  }

  function closeEditModal() { document.getElementById("editModal").classList.remove("active"); }
  function closeEditOnOverlay(e) { if (e.target === document.getElementById("editModal")) closeEditModal(); }

  // ── Update Reservation ────────────────────────
  async function updateReservation() {
    const bookingName = document.getElementById("e_bookingName").value.trim();
    if (!bookingName) { showToast("Booking name is required.", false); return; }

    const g = (elId) => document.getElementById(elId)?.value ?? "";

    const payload = {
      bookingName,
      nationality: g("e_nationality"),
      pax: {
        adults:          g("e_adults"),
        childWithBed:    g("e_childWithBed"),
        childWithoutBed: g("e_childWithoutBed"),
        childBelow5:     g("e_childBelow5"),
      },
      room: {
        category:  g("e_roomCategory"),
        noOfRooms: g("e_noOfRooms"),
        type:      g("e_roomType"),
        extraBed:  g("e_extraBed"),
        mealPlan:  g("e_mealPlan"),
      },
      visits: {
        visit1in:  g("e_visit1in")  || "N/A",
        visit1out: g("e_visit1out") || "N/A",
        visit2in:  g("e_visit2in")  || "N/A",
        visit2out: g("e_visit2out") || "N/A",
      },
      note: g("e_note"),
    };

    try {
      const res = await axios.put(`${API}/${id}`, payload, {
        headers: { "Content-Type": "application/json" }
      });
      if (res.data.success) {
        showToast("Reservation updated! ✓");
        closeEditModal();
        currentReservation = res.data.data;
        renderDetail(res.data.data);
      } else {
        showToast(res.data.message, false);
      }
    } catch { showToast("Error updating reservation.", false); }
  }

  function showToast(msg, success = true) {
    const e = document.querySelector(".toast"); if (e) e.remove();
    const t = document.createElement("div");
    t.className = `toast ${success ? "toast-success" : "toast-error"}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  loadReservation();
</script>
</body>
</html>
