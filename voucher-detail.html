<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voucher Detail | Hotel Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family:'DM Sans',sans-serif; background:#0f0f0f; color:#f0f0f0; }
    h1,h2,h3 { font-family:'Playfair Display',serif; }
    .gold { color:#c9a84c; }
    .card { background:#161616; border:1px solid #2a2a2a; border-radius:1rem; }
    .section-title { font-size:1rem; color:#c9a84c; margin-bottom:1rem; border-bottom:1px solid #2a2a2a; padding-bottom:0.5rem; font-family:'Playfair Display',serif; }
    .detail-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #1e1e1e; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { color:#666; font-size:0.85rem; }
    .detail-value { color:#f0f0f0; font-size:0.9rem; text-align:right; }
    .badge { display:inline-block; background:#1e1a0f; border:1px solid #c9a84c33; border-radius:4px; padding:3px 10px; font-size:0.78rem; color:#c9a84c; }
    .btn-gold { background:#c9a84c; color:#0f0f0f; font-weight:600; border-radius:0.5rem; padding:0.65rem 1.5rem; transition:background 0.2s; cursor:pointer; font-family:'DM Sans',sans-serif; border:none; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn-gold:hover { background:#b8943d; }
    .btn-outline { border:1px solid #c9a84c; color:#c9a84c; border-radius:0.5rem; padding:0.65rem 1.5rem; transition:all 0.2s; cursor:pointer; font-family:'DM Sans',sans-serif; background:transparent; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn-outline:hover { background:#c9a84c; color:#0f0f0f; }
    .btn-green { background:#16a34a; color:#fff; font-weight:600; border-radius:0.5rem; padding:0.65rem 1.5rem; transition:background 0.2s; cursor:pointer; font-family:'DM Sans',sans-serif; border:none; display:inline-flex; align-items:center; gap:6px; }
    .btn-green:hover { background:#15803d; }
    .input { width:100%; padding:10px 12px; font-size:14px; border:1px solid #2e2e2e; border-radius:8px; background:#1a1a1a; color:#f0f0f0; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .input:focus { border-color:#c9a84c; outline:none; }
    .input::placeholder { color:#555; }
    select.input option { background:#1a1a1a; }
    .floating { position:relative; }
    .floating label { position:absolute; top:10px; left:12px; font-size:12px; color:#666; pointer-events:none; transition:0.2s; background:#1a1a1a; padding:0 4px; }
    .floating input:focus+label,.floating input:not(:placeholder-shown)+label,.floating select:focus+label { top:-8px; font-size:11px; color:#c9a84c; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:50; opacity:0; pointer-events:none; transition:opacity 0.2s; }
    .modal-overlay.active { opacity:1; pointer-events:all; }
    .modal-box { background:#161616; border:1px solid #2a2a2a; border-radius:1rem; padding:2rem; width:100%; max-width:700px; max-height:90vh; overflow-y:auto; transform:translateY(20px); transition:transform 0.2s; }
    .modal-overlay.active .modal-box { transform:translateY(0); }
    .hotel-block-edit { background:#111; border:1px solid #2a2a2a; border-radius:0.75rem; padding:1.25rem; }
    .toast { position:fixed; bottom:2rem; right:2rem; padding:1rem 1.5rem; border-radius:0.75rem; font-size:0.9rem; z-index:999; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ── Print / PDF Styles ── */
    @media print {
      body * { visibility:hidden; }
      #pdfVoucher, #pdfVoucher * { visibility:visible; }
      #pdfVoucher { position:absolute; left:0; top:0; width:100%; background:white; }
    }
    #pdfVoucher table, #pdfVoucher td, #pdfVoucher tr { border:1px solid rgb(109,152,187); }
  </style>
</head>
<body class="min-h-screen">

<main class="max-w-4xl mx-auto px-6 py-10">

  <!-- Back -->
  <a href="voucher.html" class="inline-flex items-center gap-2 text-[#666] hover:text-[#c9a84c] text-sm mb-6 transition">
    <i class="fa fa-arrow-left"></i> Back to Vouchers
  </a>

  <!-- Action Buttons -->
  <div class="flex gap-3 mb-6 flex-wrap">
    <button onclick="openEditModal()" class="btn-outline"><i class="fa fa-edit"></i> Edit Voucher</button>
    <button onclick="window.print()" class="btn-green"><i class="fa fa-file-pdf"></i> Save as PDF</button>
  </div>

  <!-- Detail Content -->
  <div id="content">
    <div class="space-y-5">
      <div class="card p-6 space-y-3">
        ${Array(4).fill(`<div style="height:16px;background:#222;border-radius:4px;animation:shimmer 1.5s infinite"></div>`).join("")}
      </div>
    </div>
  </div>

  <!-- PDF Voucher (hidden on screen, visible on print) -->
  <div id="pdfVoucher" style="display:none;"></div>

</main>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay" onclick="closeEditOnOverlay(event)">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl text-white">Edit Voucher</h3>
      <button onclick="closeEditModal()" class="text-[#555] hover:text-white text-2xl">✕</button>
    </div>
    <div class="space-y-4">
      <p class="section-title">Guest Details</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="floating"><input class="input" id="e_guestName" type="text" placeholder=" "/><label>Guest Name *</label></div>
        <div class="floating">
          <select class="input" id="e_nationality">
            <option value="" disabled selected hidden>Select</option>
            <option>Afghan</option><option>Albanian</option><option>Algerian</option><option>American</option><option>Argentine</option><option>Armenian</option><option>Australian</option><option>Austrian</option><option>Azerbaijani</option><option>Bangladeshi</option><option>Belgian</option><option>Brazilian</option><option>British</option><option>Bulgarian</option><option>Burmese</option><option>Cambodian</option><option>Canadian</option><option>Chilean</option><option>Chinese</option><option>Colombian</option><option>Croatian</option><option>Cuban</option><option>Czech</option><option>Danish</option><option>Dutch</option><option>Egyptian</option><option>Emirati</option><option>Estonian</option><option>Ethiopian</option><option>Filipino</option><option>Finnish</option><option>French</option><option>German</option><option>Ghanaian</option><option>Greek</option><option>Hungarian</option><option>Icelandic</option><option>Indian</option><option>Indonesian</option><option>Iranian</option><option>Iraqi</option><option>Irish</option><option>Israeli</option><option>Italian</option><option>Japanese</option><option>Jordanian</option><option>Kazakhstani</option><option>Kenyan</option><option>Korean</option><option>Kuwaiti</option><option>Lebanese</option><option>Malaysian</option><option>Maldivian</option><option>Mexican</option><option>Mongolian</option><option>Moroccan</option><option>Nepalese</option><option>New Zealander</option><option>Nigerian</option><option>Norwegian</option><option>Pakistani</option><option>Peruvian</option><option>Polish</option><option>Portuguese</option><option>Qatari</option><option>Romanian</option><option>Russian</option><option>Saudi</option><option>Serbian</option><option>Singaporean</option><option>South African</option><option>Spanish</option><option>Sri Lankan</option><option>Swedish</option><option>Swiss</option><option>Syrian</option><option>Thai</option><option>Turkish</option><option>Ukrainian</option><option>Vietnamese</option>
          </select>
          <label>Nationality</label>
        </div>
      </div>
      <p class="section-title mt-2">Number of Pax</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="floating"><input class="input" id="e_adults" type="number" placeholder=" " min="0"/><label>Adults</label></div>
        <div class="floating"><input class="input" id="e_childWithBed" type="number" placeholder=" " min="0"/><label>Child with Bed</label></div>
        <div class="floating"><input class="input" id="e_childWithoutBed" type="number" placeholder=" " min="0"/><label>Child without Bed (6–10)</label></div>
        <div class="floating"><input class="input" id="e_childBelow5" type="number" placeholder=" " min="0"/><label>Child below 5 yrs</label></div>
      </div>
      <p class="section-title mt-2">Hotel Entries</p>
      <div id="e_hotelBlocks" class="space-y-4"></div>
      <div class="flex gap-3 pt-4">
        <button onclick="updateVoucher()" class="btn-gold flex-1"><i class="fa fa-save mr-2"></i>Update</button>
        <button onclick="closeEditModal()" class="btn-outline flex-1">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
<script>
  const VOUCHERS_API = "http://localhost:5000/api/vouchers";
  let currentVoucher = null;
  const id = new URLSearchParams(window.location.search).get("id");

  // ── Load Voucher ─────────────────────────────
  async function loadVoucher() {
    if (!id) { document.getElementById("content").innerHTML = `<p class="text-red-400">No voucher ID.</p>`; return; }
    try {
      const res = await fetch(`${VOUCHERS_API}/${id}`);
      const data = await res.json();
      if (data.success) { currentVoucher = data.data; renderDetail(data.data); buildPDF(data.data); }
      else document.getElementById("content").innerHTML = `<p class="text-red-400">${data.message}</p>`;
    } catch { document.getElementById("content").innerHTML = `<p class="text-red-400">Failed to load voucher.</p>`; }
  }

  function row(label, value) {
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value || "—"}</span></div>`;
  }

  function renderDetail(v) {
    document.title = `${v.guestName} | Voucher`;
    const date = new Date(v.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});
    const totalPax = (Number(v.pax?.adults)||0)+(Number(v.pax?.childWithBed)||0)+(Number(v.pax?.childWithoutBed)||0)+(Number(v.pax?.childBelow5)||0);

    document.getElementById("content").innerHTML = `
      <div class="flex items-start justify-between mb-6">
        <div>
          <h2 class="text-3xl text-white">${v.guestName}</h2>
          <p class="text-[#555] text-sm mt-1">Created on ${date}</p>
        </div>
        <span class="badge">${v.hotels?.length || 0} Hotel${v.hotels?.length !== 1 ? "s" : ""}</span>
      </div>

      <!-- Guest -->
      <div class="card p-6 mb-5">
        <p class="section-title">Guest Details</p>
        ${row("Guest Name", `<span class="text-white font-medium">${v.guestName}</span>`)}
        ${row("Nationality", v.nationality)}
      </div>

      <!-- Pax -->
      <div class="card p-6 mb-5">
        <p class="section-title">Number of Pax <span class="text-sm text-[#555] ml-2">(Total: ${totalPax})</span></p>
        ${row("Adults", v.pax?.adults)}
        ${row("Child with Bed", v.pax?.childWithBed)}
        ${row("Child without Bed (6–10 yrs)", v.pax?.childWithoutBed)}
        ${row("Child below 5 yrs", v.pax?.childBelow5)}
      </div>

      <!-- Hotels -->
      ${(v.hotels || []).map((h, i) => `
        <div class="card p-6 mb-5">
          <p class="section-title">Hotel #${i + 1} — ${h.hotelName || "—"}</p>
          ${row("Confirmation No.", `<span class="text-white font-bold">${h.confirmationNumber || "—"}</span>`)}
          ${row("Hotel", h.hotelName)}
          ${row("City / Country", h.hotelCity && h.hotelCountry ? `${h.hotelCity}, ${h.hotelCountry}` : "—")}
          ${row("Room Category", h.roomCategory)}
          ${row("No. of Rooms", h.noOfRooms)}
          ${row("Room Type", h.roomType)}
          ${row("Meal Plan", h.mealPlan ? `<span class="badge">${h.mealPlan}</span>` : "—")}
          ${row("1st Visit Check-In", h.visit1in)}
          ${row("1st Visit Check-Out", h.visit1out)}
          ${row("2nd Visit Check-In", h.visit2in)}
          ${row("2nd Visit Check-Out", h.visit2out)}
          ${row("Check-In Time", h.checkinTime)}
          ${row("Check-Out Time", h.checkoutTime)}
          ${row("Includes", h.includes)}
        </div>
      `).join("")}

      <div class="mt-4">
        <a href="vouchers.html" class="btn-gold"><i class="fa fa-arrow-left"></i> Back</a>
      </div>
    `;
  }

  // ── Build PDF ─────────────────────────────────
  function buildPDF(v) {
    const totalPax = (Number(v.pax?.adults)||0)+(Number(v.pax?.childWithBed)||0)+(Number(v.pax?.childWithoutBed)||0)+(Number(v.pax?.childBelow5)||0);

    const hotelTables = (v.hotels || []).map((h, i) => `
      <div style="margin-top:24px;">
        <div style="background:#2563eb;color:white;text-align:center;padding:8px;font-weight:bold;border-radius:4px 4px 0 0;">
          HOTEL #${i+1} — ${h.hotelName || ""}
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;width:40%;">CONFIRMATION NUMBER</td><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:bold;">${h.confirmationNumber || ""}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">HOTEL NAME</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.hotelName || ""}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">CITY / COUNTRY</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.hotelCity ? `${h.hotelCity}, ${h.hotelCountry}` : ""}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">ROOM CATEGORY</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.roomCategory || ""}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">NO. OF ROOMS</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.noOfRooms || ""}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">ROOM TYPE</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.roomType || ""}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">MEAL PLAN</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.mealPlan || ""}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">1ST VISIT</td><td style="padding:7px;border:1px solid rgb(109,152,187);">CHECK-IN: ${h.visit1in || "N/A"} &nbsp; CHECK-OUT: ${h.visit1out || "N/A"}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">2ND VISIT</td><td style="padding:7px;border:1px solid rgb(109,152,187);">CHECK-IN: ${h.visit2in || "N/A"} &nbsp; CHECK-OUT: ${h.visit2out || "N/A"}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">CHECK-IN TIME</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.checkinTime || "N/A"}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">CHECK-OUT TIME</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.checkoutTime || "N/A"}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">INCLUDES</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${h.includes || ""}</td></tr>
        </table>
      </div>
    `).join("");

    document.getElementById("pdfVoucher").style.display = "block";
    document.getElementById("pdfVoucher").innerHTML = `
      <div style="max-width:900px;margin:auto;background:white;padding:30px;font-family:Arial,sans-serif;color:#000;">

        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <img src="https://i.ibb.co/bRJr7nNM/images.png" style="height:80px;"/>
          <div style="text-align:right;font-size:13px;">
            <p style="font-weight:600;">Aspiration Asia Trekking and Expedition Pvt Ltd.</p>
            <p>Bhaktapur Durbar Square – Kathmandu, Nepal</p>
            <p>Web: www.aspirationasia.com</p>
            <p>Email: sales@aspirationasia.com / reservations@aspirationasia.com</p>
            <p>Contact: +977-982761738 / +977-9851021924</p>
          </div>
        </div>

        <!-- Title -->
        <div style="border:1px solid #ccc;text-align:center;margin-top:20px;padding:8px;font-weight:bold;color:#2563eb;font-size:16px;">
          HOTEL CONFIRMATION VOUCHER
        </div>

        <!-- Guest Info -->
        <div style="text-align:center;margin-top:16px;">
          <p style="color:#dc2626;font-weight:600;font-size:18px;">${v.guestName}</p>
          <p style="color:#ef4444;font-size:14px;">${v.nationality || ""}</p>
        </div>

        <!-- Pax Table -->
        <table style="width:100%;border-collapse:collapse;margin-top:16px;font-size:13px;">
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;width:40%;">TOTAL PAX</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${totalPax}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">ADULTS</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${v.pax?.adults || 0}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">CHILD WITH BED</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${v.pax?.childWithBed || 0}</td></tr>
          <tr style="background:rgb(206,218,228);"><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">CHILD WITHOUT BED (6–10 YRS)</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${v.pax?.childWithoutBed || 0}</td></tr>
          <tr><td style="padding:7px;border:1px solid rgb(109,152,187);font-weight:600;">CHILD BELOW 5 YRS</td><td style="padding:7px;border:1px solid rgb(109,152,187);">${v.pax?.childBelow5 || 0}</td></tr>
        </table>

        <!-- Hotel Blocks -->
        ${hotelTables}

      </div>
    `;
  }

  // ── Edit Modal ───────────────────────────────
  function openEditModal() {
    if (!currentVoucher) return;
    const v = currentVoucher;
    document.getElementById("e_guestName").value = v.guestName || "";
    document.getElementById("e_nationality").value = v.nationality || "";
    document.getElementById("e_adults").value = v.pax?.adults || "";
    document.getElementById("e_childWithBed").value = v.pax?.childWithBed || "";
    document.getElementById("e_childWithoutBed").value = v.pax?.childWithoutBed || "";
    document.getElementById("e_childBelow5").value = v.pax?.childBelow5 || "";

    const container = document.getElementById("e_hotelBlocks");
    container.innerHTML = "";
    (v.hotels || []).forEach((h, i) => {
      const block = document.createElement("div");
      block.className = "hotel-block-edit space-y-3";
      block.innerHTML = `
        <p class="text-sm gold font-semibold mb-2">Hotel #${i+1}</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="floating col-span-2"><input class="input e-conf" type="text" value="${h.confirmationNumber||""}" placeholder=" "/><label>Confirmation Number</label></div>
          <div class="floating col-span-2"><input class="input e-hotelName" type="text" value="${h.hotelName||""}" placeholder=" "/><label>Hotel Name</label></div>
          <div class="floating"><input class="input e-roomCategory" type="text" value="${h.roomCategory||""}" placeholder=" "/><label>Room Category</label></div>
          <div class="floating"><input class="input e-noOfRooms" type="text" value="${h.noOfRooms||""}" placeholder=" "/><label>No. of Rooms</label></div>
          <div class="floating">
            <select class="input e-roomType">
              <option value="" disabled ${!h.roomType?"selected":""}>Select</option>
              ${["Single Room","Double Room","Twin Room","Suite"].map(t=>`<option ${h.roomType===t?"selected":""}>${t}</option>`).join("")}
            </select>
            <label>Room Type</label>
          </div>
          <div class="floating">
            <select class="input e-mealPlan">
              <option value="" disabled ${!h.mealPlan?"selected":""}>Select</option>
              ${["EP","CP","MAP","AP","JP"].map(m=>`<option ${h.mealPlan===m?"selected":""}>${m}</option>`).join("")}
            </select>
            <label>Meal Plan</label>
          </div>
          <div class="floating"><input class="input e-v1in" type="date" value="${h.visit1in!=="N/A"?h.visit1in:""}"/><label>1st Visit Check-In</label></div>
          <div class="floating"><input class="input e-v1out" type="date" value="${h.visit1out!=="N/A"?h.visit1out:""}"/><label>1st Visit Check-Out</label></div>
          <div class="floating"><input class="input e-v2in" type="date" value="${h.visit2in!=="N/A"?h.visit2in:""}"/><label>2nd Visit Check-In</label></div>
          <div class="floating"><input class="input e-v2out" type="date" value="${h.visit2out!=="N/A"?h.visit2out:""}"/><label>2nd Visit Check-Out</label></div>
          <div class="floating"><input class="input e-cin" type="text" value="${h.checkinTime!=="N/A"?h.checkinTime:""}" placeholder=" "/><label>Check-In Time</label></div>
          <div class="floating"><input class="input e-cout" type="text" value="${h.checkoutTime!=="N/A"?h.checkoutTime:""}" placeholder=" "/><label>Check-Out Time</label></div>
          <div class="floating col-span-2"><input class="input e-includes" type="text" value="${h.includes||""}" placeholder=" "/><label>Includes</label></div>
        </div>
      `;
      container.appendChild(block);
    });

    document.getElementById("editModal").classList.add("active");
  }

  function closeEditModal() { document.getElementById("editModal").classList.remove("active"); }
  function closeEditOnOverlay(e) { if (e.target === document.getElementById("editModal")) closeEditModal(); }

  async function updateVoucher() {
    const guestName = document.getElementById("e_guestName").value.trim();
    if (!guestName) { showToast("Guest name is required.", false); return; }

    const hotels = Array.from(document.querySelectorAll(".hotel-block-edit")).map(block => ({
      confirmationNumber: block.querySelector(".e-conf")?.value || "",
      hotelName:    block.querySelector(".e-hotelName")?.value || "",
      roomCategory: block.querySelector(".e-roomCategory")?.value || "",
      noOfRooms:    block.querySelector(".e-noOfRooms")?.value || "",
      roomType:     block.querySelector(".e-roomType")?.value || "",
      mealPlan:     block.querySelector(".e-mealPlan")?.value || "",
      visit1in:     block.querySelector(".e-v1in")?.value || "N/A",
      visit1out:    block.querySelector(".e-v1out")?.value || "N/A",
      visit2in:     block.querySelector(".e-v2in")?.value || "N/A",
      visit2out:    block.querySelector(".e-v2out")?.value || "N/A",
      checkinTime:  block.querySelector(".e-cin")?.value || "N/A",
      checkoutTime: block.querySelector(".e-cout")?.value || "N/A",
      includes:     block.querySelector(".e-includes")?.value || "",
    }));

    const payload = {
      guestName,
      nationality: document.getElementById("e_nationality").value,
      pax: {
        adults:          document.getElementById("e_adults").value || 0,
        childWithBed:    document.getElementById("e_childWithBed").value || 0,
        childWithoutBed: document.getElementById("e_childWithoutBed").value || 0,
        childBelow5:     document.getElementById("e_childBelow5").value || 0,
      },
      hotels,
    };

    try {
      const res = await axios.put(`${VOUCHERS_API}/${id}`, payload, { headers: { "Content-Type": "application/json" } });
      if (res.data.success) {
        showToast("Voucher updated successfully! ✓");
        closeEditModal();
        currentVoucher = res.data.data;
        renderDetail(res.data.data);
        buildPDF(res.data.data);
      } else {
        showToast(res.data.message, false);
      }
    } catch { showToast("Error updating voucher.", false); }
  }

  // ── Toast ─────────────────────────────────────
  function showToast(message, success = true) {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const toast = document.createElement("div");
    toast.className = `toast ${success ? "bg-[#1a2e1a] border border-green-700 text-green-400" : "bg-[#2e1a1a] border border-red-700 text-red-400"}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  loadVoucher();
</script>
</body>
</html>
