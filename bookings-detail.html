<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Query Detail | ASA</title>
  <script>if (!localStorage.getItem("token")) window.location.replace("login.html");</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="shared-theme.css" />
  <style>
    .floating label {
      background: white;
    }

    .modal-box .floating label {
      background: white;
    }
  </style>
</head>

<body>
  <main class="max-w-4xl mx-auto px-6 py-10">

    <a href="bookings.html" class="inline-flex items-center gap-2 text-sm mb-6 transition" style="color:#64748b;">
      <i class="fa fa-arrow-left"></i> Back to Queries
    </a>

    <div class="flex gap-3 mb-6 flex-wrap">
      <button onclick="openEditModal()" class="btn-outline">
        <i class="fa fa-edit"></i> Edit Query
      </button>
    </div>

    <div id="content">
      <div class="space-y-5">
        <div class="skeleton h-8 w-64"></div>
        <div class="card p-6 space-y-3">
          <div class="skeleton h-4 w-full"></div>
          <div class="skeleton h-4 w-full"></div>
          <div class="skeleton h-4 w-full"></div>
          <div class="skeleton h-4 w-full"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       EDIT MODAL
  ════════════════════════════════════════════ -->
  <div id="editModal" class="modal-overlay" onclick="closeEditOnOverlay(event)">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h3 class="text-xl" style="color:#1e293b;">Edit Query</h3>
          <p id="e_displayQId" class="text-xs mt-1 font-semibold" style="color:#2563eb;"></p>
        </div>
        <button onclick="closeEditModal()"
          style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">✕</button>
      </div>

      <div class="space-y-4">

        <!-- Status -->
        <p class="section-title">Query Status</p>
        <div class="card p-4 flex items-center justify-between gap-4 flex-wrap" style="background:#f8fafc;">
          <div>
            <p class="text-sm font-semibold" style="color:#1e293b;" id="statusDesc">—</p>
          </div>
          <div class="flex gap-2">
            <button id="btnConfirmed" onclick="setStatus('confirmed')"
              class="btn-outline text-xs px-4 py-2 font-semibold" disabled>
              <i class="fa fa-check-circle mr-1"></i> Confirmed
            </button>
            <button id="btnCancelled" onclick="setStatus('cancelled')"
              class="text-xs px-4 py-2 font-semibold rounded-lg border transition"
              style="border-color:#ef4444;color:#ef4444;background:white;">
              <i class="fa fa-times-circle mr-1"></i> Mark Cancelled
            </button>
          </div>
        </div>

        <!-- Client / Agent -->
        <p class="section-title mt-2">Client / Agent Information</p>
        <div class="grid grid-cols-2 gap-4">

          <div class="floating col-span-2">
            <input class="input" id="e_clientInput" list="e_clientDatalist" placeholder=" "
              oninput="onClientInputChange()" />
            <datalist id="e_clientDatalist"></datalist>
            <input type="hidden" id="e_clientId" />
            <label>Client / Agent *</label>
          </div>

          <div class="floating col-span-2">
            <input class="input" id="e_company" type="text" readonly placeholder=" " />
            <label>Company Name</label>
          </div>
          <div class="floating">
            <input class="input" id="e_email" type="email" readonly placeholder=" " />
            <label>Email Address</label>
          </div>
          <div class="floating">
            <input class="input" id="e_mobile" type="tel" readonly placeholder=" " />
            <label>Mobile Number</label>
          </div>
          <div class="floating col-span-2">
            <input class="input" id="e_address" type="text" readonly placeholder=" " />
            <label>Address</label>
          </div>
        </div>

        <!-- Trip Details -->
        <p class="section-title mt-2">Trip Details</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating">
            <select class="input" id="e_destination" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>Nepal</option>
              <option>India</option>
              <option>Bhutan</option>
            </select>
            <label>Destination *</label>
          </div>
          <div class="floating">
            <input class="input" id="e_pickup" type="text" placeholder=" " />
            <label>Pick Up Point</label>
          </div>
          <div class="floating">
            <input class="input" id="e_drop" type="text" placeholder=" " />
            <label>Drop Point</label>
          </div>
          <div class="floating">
            <input class="input" id="e_arrival" type="date" onchange="onArrivalChange('e')" />
            <label>Arrival Date *</label>
          </div>
          <div class="floating">
            <input class="input" id="e_departure" type="date" onchange="calcDays('e')" />
            <label>Departure Date *</label>
          </div>
          <div class="floating">
            <input class="input" id="e_days" type="text" readonly placeholder=" " />
            <label>No. of Days</label>
          </div>
        </div>

        <!-- Pax Details -->
        <p class="section-title mt-2">Pax Details</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating">
            <input class="input" id="e_adults" type="number" min="0" placeholder=" " />
            <label>No. of Adults</label>
          </div>
          <div class="floating">
            <input class="input" id="e_childEB" type="number" min="0" placeholder=" " />
            <label>Child with EB</label>
          </div>
          <div class="floating">
            <input class="input" id="e_childNoEB" type="number" min="0" placeholder=" " />
            <label>Child without EB</label>
          </div>
          <div class="floating">
            <input class="input" id="e_childU5" type="number" min="0" placeholder=" " />
            <label>Child below 05 yrs</label>
          </div>
          <div class="floating">
            <input class="input" id="e_rooms" type="number" min="0" placeholder=" " />
            <label>No. of Rooms</label>
          </div>
        </div>

        <!-- Hotel & Meal -->
        <p class="section-title mt-2">Hotel & Meal</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating">
            <select class="input" id="e_hotel" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>2-star</option>
              <option>3-star</option>
              <option>4-star</option>
              <option>5-star</option>
            </select>
            <label>Hotel Category</label>
          </div>
          <div class="floating">
            <select class="input" id="e_meal" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>EP</option>
              <option>MAP</option>
              <option>CP</option>
              <option>JP</option>
              <option>AP</option>
            </select>
            <label>Meal Plan</label>
          </div>
        </div>

        <div class="flex gap-3 pt-4">
          <button onclick="updateQuery()" class="btn-blue flex-1">
            <i class="fa fa-save"></i> Update Query
          </button>
          <button onclick="closeEditModal()" class="btn-outline flex-1">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const QUERIES_API = "http://localhost:5000/api/queries";
    const SUNDRY_API = "http://localhost:5000/api/sundry";
    const authHeaders = () => ({
      "Authorization": "Bearer " + localStorage.getItem("token"),
      "Content-Type": "application/json"
    });

    const id = new URLSearchParams(window.location.search).get("id");
    let currentQuery = null;
    let sundryList = [];

    // ── LOAD SUNDRY ───────────────────────────────
    async function loadSundryDropdown() {
      try {
        const res = await fetch(`${SUNDRY_API}/dropdown`, { headers: authHeaders() });
        const data = await res.json();
        if (data.success) {
          sundryList = data.data;
          buildEditClientOptions();
        }
      } catch { /* silent */ }
    }

    function buildEditClientOptions(selectedId = "") {
      const dl = document.getElementById("e_clientDatalist");
      const input = document.getElementById("e_clientInput");
      const hidden = document.getElementById("e_clientId");
      dl.innerHTML = "";
      sundryList.forEach(s => {
        const label = s.companyName
          ? `${s.contactPerson} / ${s.phone || s.email || "—"} (${s.companyName})`
          : `${s.contactPerson} / ${s.phone || s.email || "—"}`;
        const opt = document.createElement("option");
        opt.value = label;
        opt.dataset.id = s._id;
        dl.appendChild(opt);
        if (s._id === selectedId) {
          input.value = label;
          hidden.value = s._id;
        }
      });
    }

    function onClientInputChange() {
      const input = document.getElementById("e_clientInput");
      const hidden = document.getElementById("e_clientId");
      const val = input.value.trim();
      // Try to match to a sundry entry by label
      const match = sundryList.find(s => {
        const label = s.companyName
          ? `${s.contactPerson} / ${s.phone || s.email || "—"} (${s.companyName})`
          : `${s.contactPerson} / ${s.phone || s.email || "—"}`;
        return label === val;
      });
      if (match) {
        hidden.value = match._id;
        setReadonly("e_company", match.companyName || "—");
        setReadonly("e_email", match.email || "");
        setReadonly("e_mobile", match.phone || "");
        setReadonly("e_address", match.address || "");
      } else {
        hidden.value = "";
      }
    }

    function setReadonly(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.value = value;
      el.setAttribute("placeholder", "X");
      setTimeout(() => el.setAttribute("placeholder", " "), 10);
    }

    // ── LOAD QUERY ────────────────────────────────
    async function loadQuery() {
      if (!id) {
        document.getElementById("content").innerHTML = `<p style="color:red;">No query ID provided.</p>`;
        return;
      }
      try {
        const res = await fetch(`${QUERIES_API}/${id}`, { headers: authHeaders() });
        const data = await res.json();
        if (data.success) { currentQuery = data.data; renderDetail(data.data); }
        else document.getElementById("content").innerHTML = `<p style="color:red;">${data.message}</p>`;
      } catch {
        document.getElementById("content").innerHTML = `<p style="color:red;">Failed to load query.</p>`;
      }
    }

    // ── RENDER DETAIL ─────────────────────────────
    function row(label, value) {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <span class="detail-value">${value || "—"}</span>
      </div>`;
    }

    function paxDisplay(q) {
      const adults = Number(q.adults) || 0;
      const children = (Number(q.childEB) || 0)
        + (Number(q.childNoEB) || 0)
        + (Number(q.childU5) || 0);
      return `${adults} Adult${adults !== 1 ? "s" : ""} / ${children} Child${children !== 1 ? "ren" : ""}`;
    }

    function statusBadge(status) {
      const isConf = status === "confirmed";
      return `<span class="badge" style="background:${isConf ? "#dcfce7" : "#fee2e2"};color:${isConf ? "#16a34a" : "#dc2626"};">
        <i class="fa fa-${isConf ? "check" : "times"}-circle mr-1"></i>
        ${isConf ? "Confirmed" : "Cancelled"}
      </span>`;
    }

    function renderDetail(q) {
      document.title = `${q.queryId} | Query`;
      const created = new Date(q.createdAt).toLocaleDateString("en-GB", {
        day: "2-digit", month: "long", year: "numeric"
      });
      const arrival = q.arrivalDate
        ? new Date(q.arrivalDate).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })
        : "—";
      const departure = q.departureDate
        ? new Date(q.departureDate).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })
        : "—";

      document.getElementById("content").innerHTML = `
        <div class="flex items-start justify-between mb-6">
          <div>
            <h2 class="text-3xl" style="color:#1e293b;">${q.clientName}</h2>
            <p class="text-sm mt-1" style="color:#64748b;">
              Query ID: <strong style="color:#2563eb;">${q.queryId}</strong> &nbsp;·&nbsp; Created ${created}
            </p>
          </div>
          ${statusBadge(q.status || "confirmed")}
        </div>

        <div class="card p-6 mb-5">
          <p class="section-title">Client / Agent Details</p>
          ${row("Name", `<span style="font-weight:600;">${q.clientName}</span>`)}
          ${row("Company", q.companyName)}
          ${row("Email", q.email)}
          ${row("Mobile", q.mobile)}
          ${row("Address", q.address)}
        </div>

        <div class="card p-6 mb-5">
          <p class="section-title">Trip Details</p>
          ${row("Destination", q.destination)}
          ${row("Arrival Date", arrival)}
          ${row("Departure Date", departure)}
          ${row("No. of Days", q.noOfDays)}
          ${row("Pick Up Point", q.pickupPoint)}
          ${row("Drop Point", q.dropPoint)}
        </div>

        <div class="card p-6 mb-5">
          <p class="section-title">Pax Details</p>
          ${row("Summary", `<span class="badge">${paxDisplay(q)}</span>`)}
          ${row("Adults", q.adults)}
          ${row("Child with EB", q.childEB)}
          ${row("Child without EB", q.childNoEB)}
          ${row("Child below 05 yrs", q.childU5)}
          ${row("No. of Rooms", q.rooms)}
        </div>

        <div class="card p-6 mb-5">
          <p class="section-title">Hotel & Meal</p>
          ${row("Hotel Category", q.hotelCategory)}
          ${row("Meal Plan", q.mealPlan ? `<span class="badge">${q.mealPlan}</span>` : "—")}
        </div>

        <a href="query.html" class="btn-blue"><i class="fa fa-arrow-left"></i> Back</a>
      `;
    }

    // ── EDIT MODAL ────────────────────────────────
    async function openEditModal() {
      if (!currentQuery) return;
      await loadSundryDropdown();

      const q = currentQuery;
      document.getElementById("e_displayQId").textContent = q.queryId;

      // Pre-select sundry in datalist
      const sundryId = q.sundryId?._id || q.sundryId || "";
      buildEditClientOptions(sundryId);

      // Pre-fill readonly autofill fields from saved snapshot
      setReadonly("e_company", q.companyName || "—");
      setReadonly("e_email", q.email || "");
      setReadonly("e_mobile", q.mobile || "");
      setReadonly("e_address", q.address || "");

      // Trip
      document.getElementById("e_pickup").value = q.pickupPoint || "";
      document.getElementById("e_drop").value = q.dropPoint || "";
      document.getElementById("e_days").value = q.noOfDays || "";
      document.getElementById("e_arrival").value =
        q.arrivalDate ? q.arrivalDate.substring(0, 10) : "";
      document.getElementById("e_departure").value =
        q.departureDate ? q.departureDate.substring(0, 10) : "";

      // Selects
      document.getElementById("e_destination").value = q.destination || "";
      document.getElementById("e_hotel").value = q.hotelCategory || "";
      document.getElementById("e_meal").value = q.mealPlan || "";
      if (q.destination) document.getElementById("e_destination").classList.add("has-value");
      if (q.hotelCategory) document.getElementById("e_hotel").classList.add("has-value");
      if (q.mealPlan) document.getElementById("e_meal").classList.add("has-value");

      // Pax
      document.getElementById("e_adults").value = q.adults ?? "";
      document.getElementById("e_childEB").value = q.childEB ?? "";
      document.getElementById("e_childNoEB").value = q.childNoEB ?? "";
      document.getElementById("e_childU5").value = q.childU5 ?? "";
      document.getElementById("e_rooms").value = q.rooms ?? "";

      updateStatusUI(q.status || "confirmed");
      document.getElementById("editModal").classList.add("active");
    }

    // ── STATUS UI ─────────────────────────────────
    function updateStatusUI(status) {
      const isConf = status === "confirmed";
      const btnConf = document.getElementById("btnConfirmed");
      const btnCanc = document.getElementById("btnCancelled");
      const desc = document.getElementById("statusDesc");

      desc.textContent = isConf
        ? "Status: Confirmed — query is active."
        : "Status: Cancelled — this query has been cancelled.";

      // Confirmed button — active style when confirmed, clickable when cancelled
      btnConf.disabled = isConf;
      btnConf.style.cssText = isConf
        ? "border-color:#16a34a;color:#16a34a;background:#dcfce7;opacity:1;cursor:default;border:1px solid;padding:8px 16px;font-size:0.75rem;font-weight:600;border-radius:8px;"
        : "border-color:#16a34a;color:#16a34a;background:white;border:1px solid;padding:8px 16px;font-size:0.75rem;font-weight:600;border-radius:8px;cursor:pointer;";

      // Cancelled button — active style when cancelled, clickable when confirmed
      btnCanc.disabled = !isConf;
      btnCanc.style.cssText = !isConf
        ? "border-color:#ef4444;color:#ef4444;background:#fee2e2;opacity:1;cursor:default;border:1px solid;padding:8px 16px;font-size:0.75rem;font-weight:600;border-radius:8px;"
        : "border-color:#ef4444;color:#ef4444;background:white;border:1px solid;padding:8px 16px;font-size:0.75rem;font-weight:600;border-radius:8px;cursor:pointer;";
    }

    function closeEditModal() { document.getElementById("editModal").classList.remove("active"); }
    function closeEditOnOverlay(e) {
      if (e.target === document.getElementById("editModal")) closeEditModal();
    }

    // ── CALC DAYS ─────────────────────────────────
    function calcDays(prefix = 'e') {
      const a = document.getElementById(`${prefix}_arrival`).value;
      const d = document.getElementById(`${prefix}_departure`).value;
      const el = document.getElementById(`${prefix}_days`);
      if (a && d) {
        const diff = Math.round((new Date(d) - new Date(a)) / (1000 * 60 * 60 * 24)) + 1;
        el.value = diff > 0 ? `${diff} Day${diff !== 1 ? "s" : ""}` : "";
      } else {
        el.value = "";
      }
    }

    // ── ARRIVAL DATE → SET DEPARTURE MIN ──────────
    function onArrivalChange(prefix = 'e') {
      const arrivalVal = document.getElementById(`${prefix}_arrival`).value;
      const depEl = document.getElementById(`${prefix}_departure`);
      if (arrivalVal) {
        // Set min to the day after arrival
        const nextDay = new Date(arrivalVal);
        nextDay.setDate(nextDay.getDate() + 1);
        depEl.min = nextDay.toISOString().split('T')[0];
        // Clear departure if it's now before the min
        if (depEl.value && depEl.value <= arrivalVal) {
          depEl.value = '';
        }
      } else {
        depEl.min = '';
      }
      calcDays(prefix);
    }

    // ── SET STATUS (reversible — matches bookings pattern) ────────────────
    async function setStatus(status) {
      if (!currentQuery) return;
      if (currentQuery.status === status) return;
      try {
        const res = await axios.patch(
          `${QUERIES_API}/${id}/status`,
          { status },
          { headers: authHeaders() }
        );
        if (res.data.success) {
          currentQuery.status = status;
          updateStatusUI(status);
          renderDetail(currentQuery);
          showToast(`Status updated to ${status}. ✓`);
        } else {
          showToast(res.data.message || "Failed to update.", false);
        }
      } catch { showToast("Error updating status.", false); }
    }

    // ── UPDATE QUERY ──────────────────────────────
    async function updateQuery() {
      const sundryId = document.getElementById("e_clientId").value;
      if (!sundryId) { showToast("Please select a client / agent.", false); return; }

      const dest = document.getElementById("e_destination").value;
      const arrival = document.getElementById("e_arrival").value;
      const departure = document.getElementById("e_departure").value;

      if (!dest) { showToast("Please select a destination.", false); return; }
      if (!arrival) { showToast("Please select arrival date.", false); return; }
      if (!departure) { showToast("Please select departure date.", false); return; }
      if (new Date(departure) <= new Date(arrival)) {
        showToast("Departure must be after arrival.", false); return;
      }

      const entry = sundryList.find(s => s._id === sundryId) || {};

      const payload = {
        sundryId,
        clientName: entry.contactPerson || currentQuery.clientName,
        companyName: entry.companyName || "",
        email: entry.email || "",
        mobile: entry.phone || "",
        address: entry.address || "",
        destination: dest,
        pickupPoint: document.getElementById("e_pickup").value.trim(),
        dropPoint: document.getElementById("e_drop").value.trim(),
        arrivalDate: arrival,
        departureDate: departure,
        noOfDays: document.getElementById("e_days").value,
        adults: Number(document.getElementById("e_adults").value) || 0,
        childEB: Number(document.getElementById("e_childEB").value) || 0,
        childNoEB: Number(document.getElementById("e_childNoEB").value) || 0,
        childU5: Number(document.getElementById("e_childU5").value) || 0,
        rooms: Number(document.getElementById("e_rooms").value) || 0,
        hotelCategory: document.getElementById("e_hotel").value,
        mealPlan: document.getElementById("e_meal").value,
        status: currentQuery.status,
      };

      try {
        const res = await axios.put(`${QUERIES_API}/${id}`, payload, { headers: authHeaders() });
        if (res.data.success) {
          showToast("Query updated! ✓");
          closeEditModal();
          currentQuery = res.data.data;
          renderDetail(res.data.data);
        } else {
          showToast(res.data.message || "Failed to update.", false);
        }
      } catch { showToast("Error updating query.", false); }
    }

    // ── TOAST ─────────────────────────────────────
    function showToast(msg, success = true) {
      const e = document.querySelector(".toast"); if (e) e.remove();
      const t = document.createElement("div");
      t.className = `toast ${success ? "toast-success" : "toast-error"}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ── INIT ──────────────────────────────────────
    loadQuery();
  </script>
</body>

</html>
