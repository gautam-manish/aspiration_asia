<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Hotel | Hotel Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f0f0f;
        }

        h1,
        h2,
        label {
            font-family: 'Playfair Display', serif;
        }

        .gold {
            color: #c9a84c;
        }

        .gold-border {
            border-color: #c9a84c;
        }

        .gold-bg {
            background: #c9a84c;
        }

        .input-field {
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            color: #f0f0f0;
            border-radius: 0.5rem;
            padding: 0.65rem 1rem;
            width: 100%;
            transition: border-color 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .input-field:focus {
            outline: none;
            border-color: #c9a84c;
        }

        .input-field::placeholder {
            color: #555;
        }

        select.input-field option {
            background: #1a1a1a;
        }

        .card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 1rem;
        }

        .btn-gold {
            background: #c9a84c;
            color: #0f0f0f;
            font-weight: 600;
            border-radius: 0.5rem;
            padding: 0.65rem 1.5rem;
            transition: background 0.2s, transform 0.1s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-gold:hover {
            background: #b8943d;
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid #c9a84c;
            color: #c9a84c;
            border-radius: 0.5rem;
            padding: 0.65rem 1.5rem;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-outline:hover {
            background: #c9a84c;
            color: #0f0f0f;
        }

        .meal-row {
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            z-index: 999;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen text-white">

    

    <!-- Main -->
    <main class="max-w-2xl mx-auto px-6 py-12">
        <div class="mb-8">
            <h2 class="text-3xl text-white mb-1">Add New Hotel</h2>
            <p class="text-[#666] text-sm">Fill in the details below to register a new hotel.</p>
        </div>

        <div class="card p-8 space-y-6">

            <!-- Hotel Name -->
            <div>
                <label class="block text-sm gold mb-2">Hotel Name</label>
                <input id="hotelName" type="text" placeholder="e.g. Hotel Everest" class="input-field" />
            </div>

            <!-- Country & City -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm gold mb-2">Country</label>
                    <input id="country" type="text" placeholder="e.g. Nepal" class="input-field" />
                </div>
                <div>
                    <label class="block text-sm gold mb-2">City</label>
                    <input id="city" type="text" placeholder="e.g. Kathmandu" class="input-field" />
                </div>
            </div>

            <!-- Cost Per Room -->
            <div>
                <label class="block text-sm gold mb-3">Cost Per Room</label>
                <div id="mealPlanRows" class="space-y-3"></div>
                <button onclick="addMealRow()"
                    class="mt-3 flex items-center gap-2 text-sm text-[#c9a84c] hover:text-white transition">
                    <span class="text-xl leading-none">＋</span> Add Meal Plan
                </button>
            </div>

            <!-- Actions -->
            <div class="flex gap-3 pt-2">
                <button onclick="saveHotel()" class="btn-gold flex-1">Save Hotel</button>
                <button onclick="resetForm()" class="btn-outline flex-1">Reset</button>
            </div>

        </div>
    </main>

    <script>
        const API = "http://localhost:5000/api/hotels";
        const MEAL_PLANS = ["EP", "CP", "MAP", "AP", "JP"];

        function addMealRow(mealPlan = "", rate = "") {
            const container = document.getElementById("mealPlanRows");
            const row = document.createElement("div");
            row.className = "meal-row flex items-center gap-3";
            row.innerHTML = `
        <select class="input-field meal-plan-select">
          <option value="" disabled ${!mealPlan ? "selected" : ""}>Select Plan</option>
          ${MEAL_PLANS.map(p => `<option value="${p}" ${p === mealPlan ? "selected" : ""}>${p}</option>`).join("")}
        </select>
        <input type="number" placeholder="Rate (e.g. 1200)" value="${rate}" class="input-field meal-rate-input" min="0"/>
        <button onclick="this.parentElement.remove()" class="text-[#555] hover:text-red-400 transition text-xl leading-none flex-shrink-0">✕</button>
      `;
            container.appendChild(row);
        }

        function resetForm() {
            document.getElementById("hotelName").value = "";
            document.getElementById("country").value = "";
            document.getElementById("city").value = "";
            document.getElementById("mealPlanRows").innerHTML = "";
            addMealRow();
        }

        function showToast(message, success = true) {
            const existing = document.querySelector(".toast");
            if (existing) existing.remove();
            const toast = document.createElement("div");
            toast.className = `toast ${success ? "bg-[#1a2e1a] border border-green-700 text-green-400" : "bg-[#2e1a1a] border border-red-700 text-red-400"}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function saveHotel() {
            const name = document.getElementById("hotelName").value.trim();
            const country = document.getElementById("country").value.trim();
            const city = document.getElementById("city").value.trim();

            if (!name || !country || !city) {
                showToast("Please fill in all hotel details.", false);
                return;
            }

            const rows = document.querySelectorAll(".meal-row");
            const costPerRoom = [];

            for (const row of rows) {
                const mealPlan = row.querySelector(".meal-plan-select").value;
                const rate = row.querySelector(".meal-rate-input").value;
                if (!mealPlan || rate === "") {
                    showToast("Please complete all meal plan rows.", false);
                    return;
                }
                costPerRoom.push({ mealPlan, rate: Number(rate) });
            }

            if (costPerRoom.length === 0) {
                showToast("At least one meal plan is required.", false);
                return;
            }

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, country, city, costPerRoom }),
                });
                const data = await res.json();
                if (data.success) {
                    showToast("Hotel saved successfully! ✓");
                    resetForm();
                } else {
                    showToast(data.message, false);
                }
            } catch (err) {
                showToast("Server error. Please try again.", false);
            }
        }

        // Start with one row
        addMealRow();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="sidebar.js"></script>
</body>

</html>
