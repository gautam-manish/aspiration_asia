<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Hotel | Hotel Collection</title>
    <!-- Add this as the FIRST script in <head> on every page except login.html -->
    <script>
        if (!localStorage.getItem("token")) {
            window.location.replace("login.html");
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="shared-theme.css" />
    <style>
        .meal-row {
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body class="min-h-screen">

    <main class="max-w-2xl mx-auto px-6 py-12">

        <div class="mb-8">
            <h2 class="text-3xl mb-1" style="color:#1e293b;">Add New Hotel</h2>
            <p class="text-sm" style="color:#64748b;">Fill in the details below to register a new hotel.</p>
        </div>

        <div class="card p-8 space-y-6">

            <!-- Hotel Name -->
            <div>
                <label class="block text-sm font-medium mb-2" style="color:#2563eb;">Hotel Name</label>
                <input id="hotelName" type="text" placeholder="e.g. Hotel Everest" class="input" />
            </div>

            <!-- Country & City -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2" style="color:#2563eb;">Country</label>
                    <input id="country" type="text" placeholder="e.g. Nepal" class="input" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2" style="color:#2563eb;">City</label>
                    <input id="city" type="text" placeholder="e.g. Kathmandu" class="input" />
                </div>
            </div>

            <!-- Cost Per Room -->
            <div>
                <label class="block text-sm font-medium mb-3" style="color:#2563eb;">Cost Per Room</label>
                <div id="mealPlanRows" class="space-y-3"></div>
                <button onclick="addMealRow()" class="mt-3 flex items-center gap-2 text-sm transition"
                    style="color:#2563eb;background:none;border:none;cursor:pointer;">
                    <span class="text-xl leading-none">＋</span> Add Meal Plan
                </button>
            </div>

            <!-- Actions -->
            <div class="flex gap-3 pt-2">
                <button onclick="saveHotel()" class="btn-blue flex-1">Save Hotel</button>
                <button onclick="resetForm()" class="btn-outline flex-1">Reset</button>
            </div>

        </div>
    </main>

    <script src="sidebar.js"></script>
    <script>
        const API = "http://localhost:5000/api/hotels";
        const MEAL_PLANS = ["EP", "CP", "MAP", "AP", "JP"];

        function addMealRow(mealPlan = "", inrRate = "", usdRate = "") {
            const container = document.getElementById("mealPlanRows");
            const row = document.createElement("div");
            row.className = "meal-row";
            row.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:center;">
          <select class="input meal-plan-select">
            <option value="" disabled ${!mealPlan ? "selected" : ""}>Select Plan</option>
            ${MEAL_PLANS.map(p => `<option value="${p}" ${p === mealPlan ? "selected" : ""}>${p}</option>`).join("")}
          </select>
          <input type="number" placeholder="INR Rate" value="${inrRate}" class="input inr-rate-input" min="0"/>
          <input type="number" placeholder="USD Rate" value="${usdRate}" class="input usd-rate-input" min="0"/>
          <button onclick="this.parentElement.parentElement.remove()" style="color:#94a3b8;font-size:1.2rem;background:none;border:none;cursor:pointer;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#94a3b8'">✕</button>
        </div>
      `;
            container.appendChild(row);
        }

        function resetForm() {
            document.getElementById("hotelName").value = "";
            document.getElementById("country").value = "";
            document.getElementById("city").value = "";
            document.getElementById("mealPlanRows").innerHTML = "";
            addMealRow();
        }

        function showToast(message, success = true) {
            const existing = document.querySelector(".toast");
            if (existing) existing.remove();
            const toast = document.createElement("div");
            toast.className = `toast ${success ? "toast-success" : "toast-error"}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function saveHotel() {
            const name = document.getElementById("hotelName").value.trim();
            const country = document.getElementById("country").value.trim();
            const city = document.getElementById("city").value.trim();

            if (!name || !country || !city) { showToast("Please fill in all hotel details.", false); return; }

            const rows = document.querySelectorAll(".meal-row");
            const costPerRoom = [];

            for (const row of rows) {
                const mealPlan = row.querySelector(".meal-plan-select").value;
                const inrRate = row.querySelector(".inr-rate-input").value;
                const usdRate = row.querySelector(".usd-rate-input").value;
                if (!mealPlan || inrRate === "" || usdRate === "") { showToast("Please complete all meal plan rows with INR and USD rates.", false); return; }
                costPerRoom.push({ mealPlan, inrRate: Number(inrRate), usdRate: Number(usdRate) });
            }

            if (costPerRoom.length === 0) { showToast("At least one meal plan is required.", false); return; }

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, country, city, costPerRoom }),
                });
                const data = await res.json();
                if (data.success) { showToast("Hotel saved successfully! ✓"); resetForm(); }
                else showToast(data.message, false);
            } catch { showToast("Server error. Please try again.", false); }
        }

        addMealRow();
    </script>
</body>

</html>
