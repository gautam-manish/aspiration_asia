<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings | ASA</title>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.replace("login.html");
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="shared-theme.css" />
  <style>
    .floating label {
      background: white;
    }

    .modal-box .floating label {
      background: white;
    }
  </style>
</head>

<body>
  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-3xl" style="color:#1e293b;">Bookings</h2>
        <p id="queryCount" class="text-sm mt-1" style="color:#64748b;">Loading...</p>
      </div>
      <button onclick="openModal()" class="btn-blue"><i class="fa fa-plus"></i> Create Booking</button>
    </div>

    <!-- Search Bar -->
    <div class="card p-4 mb-6 flex flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <input id="searchInput" type="text" placeholder="Search by booking ID, client name, destination..."
          class="input pr-10" oninput="handleSearch()" />
        <span class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#94a3b8;">🔍</span>
      </div>
      <button onclick="clearFilters()" class="btn-outline text-sm px-4">Clear</button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 mb-4 border-b" style="border-color:#e2e8f0;">
      <button id="tab-confirmed" onclick="switchTab('confirmed')"
        class="px-5 py-2 text-sm font-semibold border-b-2 -mb-px transition"
        style="border-color:#2563eb;color:#2563eb;">
        <i class="fa fa-check-circle mr-1"></i> Confirmed
      </button>
      <button id="tab-cancelled" onclick="switchTab('cancelled')"
        class="px-5 py-2 text-sm font-semibold border-b-2 -mb-px transition"
        style="border-color:transparent;color:#94a3b8;">
        <i class="fa fa-times-circle mr-1"></i> Cancelled
      </button>
    </div>

    <!-- Table -->
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table>
          <thead>
            <tr>
              <th>Booking ID</th>
              <th>Client / Agent</th>
              <th>Pax</th>
              <th>Arrival Date</th>
              <th>Destination</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="queryTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="hidden text-center py-16">
        <p class="text-4xl mb-3">📋</p>
        <p style="color:#64748b;">No bookings found.</p>
        <button onclick="openModal()" id="emptyCreateBtn" class="btn-blue mt-4 text-sm">Create your first booking</button>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════
       ADD QUERY MODAL
  ════════════════════════════════════════ -->
  <div id="addModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h3 class="text-xl" style="color:#1e293b;">Create Booking</h3>
          <p id="displayQId" class="text-xs mt-1 font-semibold" style="color:#2563eb;">Generating ID…</p>
        </div>
        <button onclick="closeModal()"
          style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">✕</button>
      </div>

      <div class="space-y-4">

        <!-- Client / Agent -->
  <div class="floating col-span-2 relative">

  <input
    class="input"
    id="m_clientInput"
    type="text"
    placeholder=" "
    autocomplete="off"
    oninput="filterClients()"
    onclick="showClientDropdown()"
  />

  <input type="hidden" id="m_clientId" />

  <label>Client / Agent *</label>

  <div
    id="clientDropdown"
    class="absolute left-0 right-0 top-full mt-1 bg-white border rounded-xl shadow-lg max-h-60 overflow-y-auto z-50 hidden"
    style="border-color:#e2e8f0;"
  ></div>

</div>

          <div class="floating col-span-2">
            <input class="input" id="m_company" type="text" readonly placeholder=" " />
            <label>Company Name</label>
          </div>
          <div class="floating">
            <input class="input" id="m_email" type="email" readonly placeholder=" " />
            <label>Email Address</label>
          </div>
          <div class="floating">
            <input class="input" id="m_mobile" type="tel" readonly placeholder=" " />
            <label>Mobile Number</label>
          </div>
          <div class="floating col-span-2">
            <input class="input" id="m_address" type="text" readonly placeholder=" " />
            <label>Address</label>
          </div>
        </div>

        <!-- Trip Details -->
        <p class="section-title mt-2">Trip Details</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating">
            <select class="input" id="m_destination" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>Nepal</option>
              <option>India</option>
              <option>Bhutan</option>
            </select>
            <label>Destination *</label>
          </div>
          <div class="floating">
            <input class="input" id="m_pickup" type="text" placeholder=" " />
            <label>Pick Up Point</label>
          </div>
          <div class="floating">
            <input class="input" id="m_drop" type="text" placeholder=" " />
            <label>Drop Point</label>
          </div>
          <div class="floating">
            <input class="input" id="m_arrival" type="date" onchange="onArrivalChange('m')" />
            <label>Arrival Date *</label>
          </div>
          <div class="floating">
            <input class="input" id="m_departure" type="date" onchange="calcDays('m')" />
            <label>Departure Date *</label>
          </div>
          <div class="floating">
            <input class="input" id="m_days" type="text" readonly placeholder=" " />
            <label>No. of Days</label>
          </div>
        </div>

        <!-- Pax Details -->
        <p class="section-title mt-2">Pax Details</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating">
            <input class="input" id="m_adults" type="number" min="0" placeholder=" " />
            <label>No. of Adults</label>
          </div>
          <div class="floating">
            <input class="input" id="m_childEB" type="number" min="0" placeholder=" " />
            <label>Child with EB</label>
          </div>
          <div class="floating">
            <input class="input" id="m_childNoEB" type="number" min="0" placeholder=" " />
            <label>Child without EB</label>
          </div>
          <div class="floating">
            <input class="input" id="m_childU5" type="number" min="0" placeholder=" " />
            <label>Child below 05 yrs</label>
          </div>
          <div class="floating">
            <input class="input" id="m_rooms" type="number" min="0" placeholder=" " />
            <label>No. of Rooms</label>
          </div>
        </div>

        <!-- Hotel & Meal -->
        <p class="section-title mt-2">Hotel & Meal</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating">
            <select class="input" id="m_hotel" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>2-star</option>
              <option>3-star</option>
              <option>4-star</option>
              <option>5-star</option>
            </select>
            <label>Hotel Category</label>
          </div>
          <div class="floating">
            <select class="input" id="m_meal" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>EP</option>
              <option>MAP</option>
              <option>CP</option>
              <option>JP</option>
              <option>AP</option>
            </select>
            <label>Meal Plan</label>
          </div>
        </div>

        <div class="flex gap-3 pt-4">
          <button onclick="submitQuery()" class="btn-blue flex-1">
            <i class="fa fa-save"></i> Save Booking
          </button>
          <button onclick="closeModal()" class="btn-outline flex-1">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const QUERIES_API = "http://localhost:5000/api/queries";
    const SUNDRY_API = "http://localhost:5000/api/sundry";
    const authHeaders = () => ({
      "Authorization": "Bearer " + localStorage.getItem("token"),
      "Content-Type": "application/json"
    });

    let currentTab = "confirmed";
    let searchTimeout = null;
    let pendingQId = "";
    let sundryList = [];

    document.addEventListener("DOMContentLoaded", () => {
      fetchQueries();
      loadSundryDropdown();
    });

    // ── SUNDRY DROPDOWN ───────────────────────────
    async function loadSundryDropdown() {
      try {
        const res = await fetch(`${SUNDRY_API}/dropdown`, { headers: authHeaders() });
        const data = await res.json();
        if (data.success) {
          sundryList = data.data;
          buildClientOptions();
        }
      } catch { /* silent */ }
    }
    function renderClientDropdown(list) {

  const dropdown = document.getElementById("clientDropdown");

  if (!list.length) {

    dropdown.innerHTML = `
      <div class="px-4 py-3 text-sm" style="color:#94a3b8;">
        No matching client found
      </div>
    `;

    dropdown.classList.remove("hidden");

    return;
  }

  dropdown.innerHTML = list.map(s => {

    const label = s.companyName
      ? `${s.contactPerson} / ${s.phone || s.email || "—"} (${s.companyName})`
      : `${s.contactPerson} / ${s.phone || s.email || "—"}`;

    return `
      <div
        class="px-4 py-3 text-sm cursor-pointer hover:bg-slate-50 border-b last:border-b-0"
        style="border-color:#f1f5f9;"
        onclick="selectClient('${s._id}')"
      >
        ${label}
      </div>
    `;
  }).join("");

  dropdown.classList.remove("hidden");
}
function showClientDropdown() {
  renderClientDropdown(sundryList);
}
function filterClients() {

  const term = document
    .getElementById("m_clientInput")
    .value
    .trim()
    .toLowerCase();

  const filtered = sundryList.filter(s => {

    const label = s.companyName
      ? `${s.contactPerson} / ${s.phone || s.email || "—"} (${s.companyName})`
      : `${s.contactPerson} / ${s.phone || s.email || "—"}`;

    return label.toLowerCase().includes(term);
  });

  renderClientDropdown(filtered);
}
function selectClient(id) {

  const entry = sundryList.find(s => s._id === id);

  if (!entry) return;

  const label = entry.companyName
    ? `${entry.contactPerson} / ${entry.phone || entry.email || "—"} (${entry.companyName})`
    : `${entry.contactPerson} / ${entry.phone || entry.email || "—"}`;

  document.getElementById("m_clientInput").value = label;

  document.getElementById("m_clientId").value = entry._id;

  setReadonly("m_company", entry.companyName || "—");
  setReadonly("m_email", entry.email || "");
  setReadonly("m_mobile", entry.phone || "");
  setReadonly("m_address", entry.address || "");

  document.getElementById("clientDropdown").classList.add("hidden");
}
document.addEventListener("click", function(e) {

  const dropdown = document.getElementById("clientDropdown");

  const input = document.getElementById("m_clientInput");

  if (!dropdown.contains(e.target) && e.target !== input) {
    dropdown.classList.add("hidden");
  }
});

    
function onClientInputChange() {

  const input = document.getElementById("m_clientInput").value.trim();

  const hiddenId = document.getElementById("m_clientId");

  const entry = sundryList.find(s => {

    const label = s.companyName
      ? `${s.contactPerson} / ${s.phone || s.email || "—"} (${s.companyName})`
      : `${s.contactPerson} / ${s.phone || s.email || "—"}`;

    return label === input;
  });

  if (!entry) {

    hiddenId.value = "";

    setReadonly("m_company", "");
    setReadonly("m_email", "");
    setReadonly("m_mobile", "");
    setReadonly("m_address", "");

    return;
  }

  hiddenId.value = entry._id;

  setReadonly("m_company", entry.companyName || "—");
  setReadonly("m_email", entry.email || "");
  setReadonly("m_mobile", entry.phone || "");
  setReadonly("m_address", entry.address || "");
}

   

    function setReadonly(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.value = value;
      el.setAttribute("placeholder", "X");
      setTimeout(() => el.setAttribute("placeholder", " "), 10);
    }

    // ── FETCH QUERIES ─────────────────────────────
    async function fetchQueries(search = "") {
      try {
        showSkeletons();
        let url = `${QUERIES_API}?status=${currentTab}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        const res = await fetch(url, { headers: authHeaders() });
        const data = await res.json();
        if (data.success) renderTable(data.data);
      } catch { showToast("Failed to load queries.", false); }
    }

    // ── RENDER TABLE ──────────────────────────────
    function paxDisplay(q) {
      const adults = Number(q.adults) || 0;
      const children = (Number(q.childEB) || 0)
        + (Number(q.childNoEB) || 0)
        + (Number(q.childU5) || 0);
      return `${adults} Adult${adults !== 1 ? "s" : ""} / ${children} Child${children !== 1 ? "ren" : ""}`;
    }

    function renderTable(queries) {
      const tbody = document.getElementById("queryTableBody");
      const empty = document.getElementById("emptyState");
      document.getElementById("queryCount").textContent =
        `${queries.length} booking${queries.length !== 1 ? "s" : "y"} found`;

      if (queries.length === 0) {
        tbody.innerHTML = "";
        empty.classList.remove("hidden");
        document.getElementById("emptyCreateBtn").style.display = currentTab === "cancelled" ? "none" : "";
        return;
      }
      empty.classList.add("hidden");
      tbody.innerHTML = queries.map(q => {
        const arrival = q.arrivalDate
          ? new Date(q.arrivalDate).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })
          : "—";
        return `<tr>
          <td style="font-weight:600;color:#2563eb;">${q.queryId}</td>
          <td style="font-weight:500;">${q.clientName}</td>
          <td><span class="badge">${paxDisplay(q)}</span></td>
          <td>${arrival}</td>
          <td>${q.destination || "—"}</td>
          <td>
            <a href="bookings-detail.html?id=${q._id}" class="btn-outline text-xs px-3 py-1">
              Edit <i class="fa fa-arrow-right"></i>
            </a>
          </td>
        </tr>`;
      }).join("");
    }

    function showSkeletons() {
      document.getElementById("queryTableBody").innerHTML =
        Array(5).fill(
          `<tr>${Array(6).fill(`<td><div class="skeleton h-4 w-20"></div></td>`).join("")}</tr>`
        ).join("");
    }

    // ── TABS ─────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tab-confirmed").style.cssText =
        tab === "confirmed" ? "border-color:#2563eb;color:#2563eb;" : "border-color:transparent;color:#94a3b8;";
      document.getElementById("tab-cancelled").style.cssText =
        tab === "cancelled" ? "border-color:#ef4444;color:#ef4444;" : "border-color:transparent;color:#94a3b8;";
      fetchQueries(document.getElementById("searchInput").value.trim());
    }

    // ── SEARCH ────────────────────────────────────
    function handleSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() =>
        fetchQueries(document.getElementById("searchInput").value.trim()), 400);
    }

    function clearFilters() {
      document.getElementById("searchInput").value = "";
      fetchQueries();
    }

    // ── CALC DAYS ─────────────────────────────────
    function calcDays(prefix) {
      const a = document.getElementById(`${prefix}_arrival`).value;
      const d = document.getElementById(`${prefix}_departure`).value;
      const el = document.getElementById(`${prefix}_days`);
      if (a && d) {
        const diff = Math.round((new Date(d) - new Date(a)) / (1000 * 60 * 60 * 24)) + 1;
        el.value = diff > 0 ? `${diff} Day${diff !== 1 ? "s" : ""}` : "";
      } else {
        el.value = "";
      }
    }

    // ── ARRIVAL DATE → SET DEPARTURE MIN ──────────
    function onArrivalChange(prefix) {
      const arrivalVal = document.getElementById(`${prefix}_arrival`).value;
      const depEl = document.getElementById(`${prefix}_departure`);
      if (arrivalVal) {
        // Set min to the day after arrival
        const nextDay = new Date(arrivalVal);
        nextDay.setDate(nextDay.getDate() + 1);
        depEl.min = nextDay.toISOString().split('T')[0];
        // Clear departure if it's now before the min
        if (depEl.value && depEl.value <= arrivalVal) {
          depEl.value = '';
        }
      } else {
        depEl.min = '';
      }
      calcDays(prefix);
    }

    // ── MODAL ─────────────────────────────────────
    async function openModal() {
      resetForm();
      document.getElementById("displayQId").textContent = "Generating ID…";
      document.getElementById("addModal").classList.add("active");
      await loadSundryDropdown();
      try {
        const res = await fetch(`${QUERIES_API}/next-id`, { headers: authHeaders() });
        const data = await res.json();
        if (data.success) {
          pendingQId = data.queryId;
          document.getElementById("displayQId").textContent = pendingQId;
        }
      } catch {
        pendingQId = "";
        document.getElementById("displayQId").textContent = "ID assigned on save";
      }
    }

    function closeModal() { document.getElementById("addModal").classList.remove("active"); }
    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById("addModal")) closeModal();
    }

    function resetForm() {

  document.getElementById("m_clientInput").value = "";
  document.getElementById("m_clientId").value = "";

  [
    "m_company",
    "m_email",
    "m_mobile",
    "m_address",
    "m_pickup",
    "m_drop",
    "m_days",
    "m_arrival",
    "m_departure"
  ].forEach(id => {

    const el = document.getElementById(id);

    if (el) el.value = "";
  });

  [
    "m_destination",
    "m_hotel",
    "m_meal"
  ].forEach(id => {

    const el = document.getElementById(id);

    if (el) {
      el.value = "";
      el.classList.remove("has-value");
    }
  });

  [
    "m_adults",
    "m_childEB",
    "m_childNoEB",
    "m_childU5",
    "m_rooms"
  ].forEach(id => {

    const el = document.getElementById(id);

    if (el) el.value = "";
  });
}

    // ── SUBMIT ────────────────────────────────────
    async function submitQuery() {
     const sundryId = document.getElementById("m_clientId").value;
      if (!sundryId) { showToast("Please select a client / agent.", false); return; }

      const dest = document.getElementById("m_destination").value;
      const arrival = document.getElementById("m_arrival").value;
      const departure = document.getElementById("m_departure").value;

      if (!dest) { showToast("Please select a destination.", false); return; }
      if (!arrival) { showToast("Please select arrival date.", false); return; }
      if (!departure) { showToast("Please select departure date.", false); return; }
      if (new Date(departure) <= new Date(arrival)) {
        showToast("Departure must be after arrival.", false); return;
      }

      const entry = sundryList.find(s => s._id === sundryId) || {};

      const payload = {
        queryId: pendingQId,
        sundryId,
        clientName: entry.contactPerson || "",
        companyName: entry.companyName || "",
        email: entry.email || "",
        mobile: entry.phone || "",
        address: entry.address || "",
        destination: dest,
        pickupPoint: document.getElementById("m_pickup").value.trim(),
        dropPoint: document.getElementById("m_drop").value.trim(),
        arrivalDate: arrival,
        departureDate: departure,
        noOfDays: document.getElementById("m_days").value,
        adults: Number(document.getElementById("m_adults").value) || 0,
        childEB: Number(document.getElementById("m_childEB").value) || 0,
        childNoEB: Number(document.getElementById("m_childNoEB").value) || 0,
        childU5: Number(document.getElementById("m_childU5").value) || 0,
        rooms: Number(document.getElementById("m_rooms").value) || 0,
        hotelCategory: document.getElementById("m_hotel").value,
        mealPlan: document.getElementById("m_meal").value,
      };

      try {
        const res = await axios.post(QUERIES_API, payload, { headers: authHeaders() });
        if (res.data.success) {
          showToast(`Query ${res.data.data.queryId} created! ✓`);
          closeModal();
          fetchQueries();
        } else {
          showToast(res.data.message || "Failed to save.", false);
        }
      } catch { showToast("Error saving query.", false); }
    }

    // ── TOAST ─────────────────────────────────────
    function showToast(msg, success = true) {
      const e = document.querySelector(".toast"); if (e) e.remove();
      const t = document.createElement("div");
      t.className = `toast ${success ? "toast-success" : "toast-error"}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>

</html>
