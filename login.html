<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Hotel Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 1.25rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        .input {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            outline: none;
        }

        .input:focus {
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .input::placeholder {
            color: #94a3b8;
        }

        .btn-login {
            width: 100%;
            background: #2563eb;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: #1d4ed8;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            display: none;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-wrapper .eye-btn:hover {
            color: #2563eb;
        }
    </style>
</head>

<body>
    <div class="login-card">

        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div style="font-size:2.5rem;margin-bottom:12px;">🏨</div>
            <h1 style="font-family:'Playfair Display',serif;font-size:1.6rem;color:#1e293b;margin-bottom:4px;">
                Aspiration Asia
            </h1>
            <!-- <p style="color:#64748b;font-size:0.85rem;">Aspiration Asia Trekking and Expedition</p> -->
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg mb-4"></div>

        <!-- Form -->
        <div class="space-y-4">

            <!-- Username -->
            <div>
                <label style="display:block;font-size:0.82rem;font-weight:500;color:#475569;margin-bottom:6px;">
                    Username
                </label>
                <div class="input-wrapper">
                    <input id="username" type="text" class="input" placeholder="Enter username"
                        autocomplete="username" />
                </div>
            </div>

            <!-- Password -->
            <div>
                <label style="display:block;font-size:0.82rem;font-weight:500;color:#475569;margin-bottom:6px;">
                    Password
                </label>
                <div class="input-wrapper">
                    <input id="password" type="password" class="input" placeholder="Enter password"
                        style="padding-right:40px;" autocomplete="current-password" />
                    <button class="eye-btn" onclick="togglePassword()" id="eyeBtn" tabindex="-1">
                        <i class="fa fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Login Button -->
            <button id="loginBtn" class="btn-login" onclick="handleLogin()">
                <i class="fa fa-sign-in-alt"></i> Login
            </button>

        </div>

        <!-- Footer -->
        <p style="text-align:center;color:#94a3b8;font-size:0.75rem;margin-top:24px;">
            Admin access only
        </p>

    </div>

    <script>
        const API = "http://localhost:5000/api/auth/login";

        // ── Redirect if already logged in ────────────
        if (localStorage.getItem("token")) {
            window.location.href = "index.html";
        }

        // ── Disable browser back button on login page ─
        // Fill history with login.html entries so the URL never changes.
        for (let i = 0; i < 20; i++) {
            history.pushState(null, "", location.href);
        }
        window.addEventListener("popstate", function () {
            history.pushState(null, "", location.href);
        });

        // ── Toggle Password Visibility ────────────────
        function togglePassword() {
            const input = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if (input.type === "password") {
                input.type = "text";
                icon.className = "fa fa-eye-slash";
            } else {
                input.type = "password";
                icon.className = "fa fa-eye";
            }
        }

        // ── Handle Login ──────────────────────────────
        async function handleLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const loginBtn = document.getElementById("loginBtn");

            errorMsg.style.display = "none";

            if (!username || !password) {
                errorMsg.textContent = "Please enter both username and password.";
                errorMsg.style.display = "block";
                return;
            }

            // Loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Logging in...`;

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "index.html";
                } else {
                    errorMsg.textContent = data.message || "Invalid credentials.";
                    errorMsg.style.display = "block";
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = `<i class="fa fa-sign-in-alt"></i> Login`;
                }
            } catch {
                errorMsg.textContent = "Server error. Please try again.";
                errorMsg.style.display = "block";
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<i class="fa fa-sign-in-alt"></i> Login`;
            }
        }

        // ── Enter key to submit ───────────────────────
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") handleLogin();
        });
    </script>
</body>

</html>
