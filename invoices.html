<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoices | Hotel Collection</title>
    <script>if (!localStorage.getItem("token")) window.location.replace("login.html");</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="shared-theme.css" />
    <style>
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: #eff6ff;
        }

        th {
            padding: 13px 16px;
            text-align: left;
            font-size: 0.78rem;
            color: #2563eb;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        td {
            padding: 13px 16px;
            font-size: 0.88rem;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }

        tbody tr:hover {
            background: #f8fafc;
            cursor: pointer;
        }

        .badge {
            display: inline-block;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.75rem;
            color: #2563eb;
            font-weight: 500;
        }

        /* Pagination */
        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #475569;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .page-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
        }

        .page-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            font-weight: 600;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            z-index: 999;
            animation: slideUp 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>
    <main class="max-w-6xl mx-auto px-6 py-10">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
            <div>
                <h2 class="text-3xl" style="color:#1e293b;font-family:'Playfair Display',serif;">Invoices</h2>
                <p id="invoiceCount" class="text-sm mt-1" style="color:#64748b;">Loading...</p>
            </div>
            <a href="invoice.html" class="btn-blue"><i class="fa fa-plus"></i> New Invoice</a>
        </div>

        <!-- Search + Filter -->
        <div class="card p-4 mb-6 flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <input id="searchInput" type="text" placeholder="Search by client name..." class="input pr-10"
                    oninput="handleSearch()" />
                <span class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#94a3b8;">🔍</span>
            </div>
            <input id="dateFilter" type="date" class="input sm:w-48" onchange="handleSearch()" />
            <button onclick="clearFilters()" class="btn-outline text-sm px-4">Clear</button>
        </div>

        <!-- Table -->
        <div class="card overflow-hidden mb-6">
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Invoice No.</th>
                            <th>Booking ID</th>
                            <th>Client Name</th>
                            <th>Date</th>
                            <th>Balance</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="invoiceTableBody"></tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden text-center py-16">
                <p class="text-4xl mb-3">🧾</p>
                <p style="color:#64748b;">No invoices found.</p>
                <a href="invoice.html" class="btn-blue inline-flex mt-4 text-sm">Create your first invoice</a>
            </div>
        </div>

        <!-- Pagination -->
        <div id="paginationWrap" class="flex items-center justify-between flex-wrap gap-3"
            >
            <p id="pageInfo" class="text-sm" style="color:#64748b;"></p>
            <div class="flex items-center gap-2" id="pageButtons"></div>
        </div>

    </main>

    <script src="sidebar.js"></script>
    <script>
        const API = "http://localhost:5000/api/invoices";
        const ROWS_PER_PAGE = 50;

        let allInvoices = [];
        let filtered = [];
        let currentPage = 1;
        let searchTimeout = null;

        // ── Auth helper ───────────────────────
        function authHeaders() {
            return { "Authorization": "Bearer " + localStorage.getItem("token") };
        }

        // ── Currency symbol map ───────────────────────
        const currencyPrefixMap = { '$': 'USD ', '€': 'EUR ', '£': 'GBP ', '₹': 'INR ', 'Rs ': 'NPR ' };

        function fmtMoney(inv) {
            const sym = inv.currency || '$';
            const prefix = currencyPrefixMap[sym] || '';
            const total = Number(inv.total || 0);
            const formatted = total.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return `${prefix}${sym}${formatted}`;
        }

        // ── Fetch all invoices ────────────────────────
        async function fetchInvoices() {
            try {
                showSkeletons();
                const res = await fetch(API, { headers: authHeaders() });
                const data = await res.json();
                if (data.success) {
                    allInvoices = data.data; // already sorted newest first from backend
                    applyFilters();
                }
            } catch { showToast("Failed to load invoices.", false); }
        }

        // ── Apply search + date filter (client-side) ──
        function applyFilters() {
            const search = document.getElementById("searchInput").value.trim().toLowerCase();
            const date = document.getElementById("dateFilter").value;

            filtered = allInvoices.filter(inv => {
                const nameMatch = !search || (inv.billTo?.name || "").toLowerCase().includes(search);
                const dateMatch = !date || (inv.invoiceDate || "").startsWith(date);
                return nameMatch && dateMatch;
            });

            currentPage = 1;
            renderTable();
            renderPagination();
        }

        // ── Render table for current page ────────────
        function renderTable() {
            const tbody = document.getElementById("invoiceTableBody");
            const empty = document.getElementById("emptyState");

            const totalCount = filtered.length;
            document.getElementById("invoiceCount").textContent =
                `${totalCount} invoice${totalCount !== 1 ? "s" : ""} found`;

            if (totalCount === 0) {
                tbody.innerHTML = "";
                empty.classList.remove("hidden");

                return;
            }

            empty.classList.add("hidden");
            document.getElementById("paginationWrap").style.removeProperty("display");

            const start = (currentPage - 1) * ROWS_PER_PAGE;
            const end = Math.min(start + ROWS_PER_PAGE, totalCount);
            const page = filtered.slice(start, end);

            tbody.innerHTML = page.map((inv, i) => {
                const rowNum = start + i + 1;
                const date = inv.invoiceDate
                    ? new Date(inv.invoiceDate + "T00:00:00").toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })
                    : "—";
                const createdDate = new Date(inv.createdAt).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });

                return `
        <tr onclick="window.location.href='invoice.html?id=${inv._id}'" title="Click to edit">
          <td style="color:#94a3b8;font-size:0.8rem;">${rowNum}</td>
          <td><span class="badge">${inv.invoiceNumber || "—"}</span></td>
          <td style="color:#64748b;font-size:0.82rem;">${inv.bookingId || "—"}</td>
          <td style="font-weight:500;">${inv.billTo?.name || "—"}</td>
          <td style="color:#64748b;">${date || createdDate}</td>
          <td style="font-weight:700;color:#1e293b;">${fmtMoney(inv)}</td>
          <td onclick="event.stopPropagation();">
            <div style="display:flex;gap:8px;">
              <a href="invoice.html?id=${inv._id}" class="btn-outline" style="font-size:0.78rem;padding:4px 12px;">
                <i class="fa fa-edit"></i> Edit
              </a>
              <button onclick="deleteInvoice('${inv._id}')" style="border:1px solid #fecaca;color:#ef4444;border-radius:6px;padding:4px 10px;font-size:0.78rem;background:transparent;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#ef4444';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='#ef4444'">
                <i class="fa fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>`;
            }).join("");
        }

        // ── Pagination ────────────────────────────────
        function renderPagination() {
            const totalPages = Math.ceil(filtered.length / ROWS_PER_PAGE);
            const wrap = document.getElementById("paginationWrap");
            const btns = document.getElementById("pageButtons");
            const info = document.getElementById("pageInfo");

            if (totalPages <= 1) {
                btns.innerHTML = `<button class="page-btn active">1</button>`;
                info.textContent = `Showing 1–${filtered.length} of ${filtered.length} invoice${filtered.length !== 1 ? "s" : ""}`;
                wrap.style.removeProperty("display");
                return;
            }

            // Build page number buttons — show max 7 around current
            let pages = [];
            if (totalPages <= 7) {
                pages = Array.from({ length: totalPages }, (_, i) => i + 1);
            } else {
                pages = [1];
                if (currentPage > 3) pages.push("...");
                for (let p = Math.max(2, currentPage - 1); p <= Math.min(totalPages - 1, currentPage + 1); p++) {
                    pages.push(p);
                }
                if (currentPage < totalPages - 2) pages.push("...");
                pages.push(totalPages);
            }

            btns.innerHTML = `
      <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>
        <i class="fa fa-chevron-left" style="font-size:0.75rem;"></i>
      </button>
      ${pages.map(p => p === "..."
                ? `<span style="padding:0 4px;color:#94a3b8;align-self:center;">...</span>`
                : `<button class="page-btn ${p === currentPage ? "active" : ""}" onclick="goToPage(${p})">${p}</button>`
            ).join("")}
      <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>
        <i class="fa fa-chevron-right" style="font-size:0.75rem;"></i>
      </button>
    `;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filtered.length / ROWS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            renderPagination();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // ── Search ────────────────────────────────────
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilters, 300);
        }

        function clearFilters() {
            document.getElementById("searchInput").value = "";
            document.getElementById("dateFilter").value = "";
            applyFilters();
        }

        // ── Delete ────────────────────────────────────
        async function deleteInvoice(id) {
            if (!confirm("Are you sure you want to delete this invoice?")) return;
            try {
                const res = await fetch(`${API}/${id}`, { method: "DELETE", headers: authHeaders() });
                const data = await res.json();
                if (data.success) {
                    showToast("Invoice deleted! ✓");
                    allInvoices = allInvoices.filter(inv => inv._id !== id);
                    applyFilters();
                } else showToast(data.message, false);
            } catch { showToast("Error deleting invoice.", false); }
        }

        // ── Skeletons ─────────────────────────────────
        function showSkeletons() {
            document.getElementById("invoiceTableBody").innerHTML = Array(8).fill(`
      <tr>
        <td><div class="skeleton h-4 w-6"></div></td>
        <td><div class="skeleton h-5 w-28"></div></td>
        <td><div class="skeleton h-4 w-24"></div></td>
        <td><div class="skeleton h-4 w-36"></div></td>
        <td><div class="skeleton h-4 w-24"></div></td>
        <td><div class="skeleton h-4 w-28"></div></td>
        <td><div class="skeleton h-7 w-20"></div></td>
      </tr>`).join("");
        }

        // ── Toast ─────────────────────────────────────
        function showToast(msg, success = true) {
            const e = document.querySelector(".toast"); if (e) e.remove();
            const t = document.createElement("div");
            t.className = `toast ${success ? "toast-success" : "toast-error"}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ── Handle ?id param — load invoice into editor
        // (invoice.html handles this, here we just list)

        // ── Init ──────────────────────────────────────
        fetchInvoices();
    </script>
</body>

</html>
