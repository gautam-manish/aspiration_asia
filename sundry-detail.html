<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundry Detail | ASA</title>
  <script>if (!localStorage.getItem("token")) window.location.replace("login.html");</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="shared-theme.css" />
  <style>
    .floating label { background: white; }
    .modal-box .floating label { background: white; }

    .radio-group {
      display: flex;
      gap: 12px;
    }
    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      color: #64748b;
      transition: all 0.18s;
      background: white;
      user-select: none;
    }
    .radio-option input[type="radio"] { display: none; }
    .radio-option.selected-debtor  { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    .radio-option.selected-creditor{ border-color: #16a34a; color: #16a34a; background: #f0fdf4; }

    .badge-debtor   { background:#dbeafe; color:#1d4ed8; padding:3px 12px; border-radius:999px; font-size:0.78rem; font-weight:600; }
    .badge-creditor { background:#dcfce7; color:#15803d; padding:3px 12px; border-radius:999px; font-size:0.78rem; font-weight:600; }
  </style>
</head>

<body>
  <main class="max-w-4xl mx-auto px-6 py-10">

    <a href="sundry.html" class="inline-flex items-center gap-2 text-sm mb-6 transition" style="color:#64748b;">
      <i class="fa fa-arrow-left"></i> Back to Sundry
    </a>

    <div class="flex gap-3 mb-6 flex-wrap">
      <button onclick="openEditModal()" class="btn-outline">
        <i class="fa fa-edit"></i> Edit Entry
      </button>
    </div>

    <div id="content">
      <div class="space-y-5">
        <div class="skeleton h-8 w-64"></div>
        <div class="card p-6 space-y-3">
          ${Array(6).fill(`<div class="skeleton h-4 w-full"></div>`).join("")}
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       EDIT MODAL
  ════════════════════════════════════════════ -->
  <div id="editModal" class="modal-overlay" onclick="closeEditOnOverlay(event)">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl" style="color:#1e293b;">Edit Entry</h3>
        <button onclick="closeEditModal()"
          style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">✕</button>
      </div>

      <div class="space-y-4">

        <!-- Type -->
        <p class="section-title">Entry Type *</p>
        <div class="radio-group">
          <label class="radio-option" id="e_label_debtor">
            <input type="radio" name="e_type" value="debtor" onchange="onTypeChange('e')" />
            <i class="fa fa-arrow-down"></i> Debtor
          </label>
          <label class="radio-option" id="e_label_creditor">
            <input type="radio" name="e_type" value="creditor" onchange="onTypeChange('e')" />
            <i class="fa fa-arrow-up"></i> Creditor
          </label>
        </div>

        <!-- Company & Contact -->
        <p class="section-title mt-2">Company Information</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating col-span-2">
            <input class="input" id="e_company" type="text" placeholder=" " />
            <label>Company Name</label>
          </div>
          <div class="floating">
            <input class="input" id="e_contact" type="text" placeholder=" " />
            <label>Contact Person *</label>
          </div>
          <div class="floating">
            <input class="input" id="e_panvat" type="text" placeholder=" " />
            <label>PAN / VAT / GST</label>
          </div>
          <div class="floating col-span-2">
            <input class="input" id="e_address" type="text" placeholder=" " />
            <label>Address</label>
          </div>
          <div class="floating">
            <input class="input" id="e_phone" type="number" placeholder=" " />
            <label>Contact Number</label>
          </div>
          <div class="floating">
            <input class="input" id="e_email" type="email" placeholder=" " />
            <label>Email</label>
          </div>
          <div class="floating">
            <select class="input" id="e_country" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>Nepal</option>
              <option>India</option>
              <option>Bhutan</option>
            </select>
            <label>Country</label>
          </div>
        </div>

        <div class="flex gap-3 pt-4">
          <button onclick="updateSundry()" class="btn-blue flex-1">
            <i class="fa fa-save"></i> Update Entry
          </button>
          <button onclick="closeEditModal()" class="btn-outline flex-1">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const SUNDRY_API = "http://localhost:5000/api/sundry";
    const id = new URLSearchParams(window.location.search).get("id");
    let currentEntry = null;

    // ── RADIO STYLE ──────────────────────────────
    function onTypeChange(prefix) {
      const val = document.querySelector(`input[name="${prefix}_type"]:checked`)?.value;
      const lD  = document.getElementById(`${prefix}_label_debtor`);
      const lC  = document.getElementById(`${prefix}_label_creditor`);
      lD.className = "radio-option" + (val === "debtor"   ? " selected-debtor"   : "");
      lC.className = "radio-option" + (val === "creditor" ? " selected-creditor" : "");
    }

    // ── LOAD ──────────────────────────────────────
    async function loadEntry() {
      if (!id) {
        document.getElementById("content").innerHTML = `<p style="color:red;">No entry ID provided.</p>`;
        return;
      }
      try {
        const res  = await fetch(`${SUNDRY_API}/${id}`);
        const data = await res.json();
        if (data.success) { currentEntry = data.data; renderDetail(data.data); }
        else document.getElementById("content").innerHTML = `<p style="color:red;">${data.message}</p>`;
      } catch {
        document.getElementById("content").innerHTML = `<p style="color:red;">Failed to load entry.</p>`;
      }
    }

    // ── RENDER DETAIL ─────────────────────────────
    function row(label, value) {
      return `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <span class="detail-value">${value || "—"}</span>
      </div>`;
    }

    function renderDetail(s) {
      document.title = `${s.contactPerson} | Sundry`;
      const created = new Date(s.createdAt).toLocaleDateString("en-GB", {
        day: "2-digit", month: "long", year: "numeric"
      });
      const isDebtor = s.type === "debtor";

      document.getElementById("content").innerHTML = `
        <div class="flex items-start justify-between mb-6">
          <div>
            <h2 class="text-3xl" style="color:#1e293b;">${s.contactPerson}</h2>
            ${s.companyName ? `<p class="text-base mt-1" style="color:#475569;">${s.companyName}</p>` : ""}
            <p class="text-sm mt-1" style="color:#64748b;">Added on ${created}</p>
          </div>
          <span class="badge-${s.type}">
            <i class="fa fa-arrow-${isDebtor ? 'down' : 'up'} mr-1"></i>
            ${isDebtor ? "Debtor" : "Creditor"}
          </span>
        </div>

        <div class="card p-6 mb-5">
          <p class="section-title">Company Information</p>
          ${row("Company Name", s.companyName)}
          ${row("Contact Person", `<span style="font-weight:600;">${s.contactPerson}</span>`)}
          ${row("PAN / VAT / GST", s.panVatGst)}
          ${row("Address", s.address)}
          ${row("Country", s.country)}
        </div>

        <div class="card p-6 mb-5">
          <p class="section-title">Contact Details</p>
          ${row("Contact Number", s.phone)}
          ${row("Email", s.email)}
        </div>

        <a href="sundry.html" class="btn-blue"><i class="fa fa-arrow-left"></i> Back</a>
      `;
    }

    // ── EDIT MODAL ────────────────────────────────
    function openEditModal() {
      if (!currentEntry) return;
      const s = currentEntry;

      document.getElementById("e_company").value = s.companyName   || "";
      document.getElementById("e_contact").value = s.contactPerson || "";
      document.getElementById("e_panvat").value  = s.panVatGst     || "";
      document.getElementById("e_address").value = s.address       || "";
      document.getElementById("e_phone").value   = s.phone         || "";
      document.getElementById("e_email").value   = s.email         || "";
      document.getElementById("e_country").value = s.country       || "";
      if (s.country) document.getElementById("e_country").classList.add("has-value");

      // Set radio
      const radio = document.querySelector(`input[name="e_type"][value="${s.type}"]`);
      if (radio) { radio.checked = true; onTypeChange("e"); }

      document.getElementById("editModal").classList.add("active");
    }

    function closeEditModal() { document.getElementById("editModal").classList.remove("active"); }
    function closeEditOnOverlay(e) {
      if (e.target === document.getElementById("editModal")) closeEditModal();
    }

    // ── UPDATE ────────────────────────────────────
    async function updateSundry() {
      const contact = document.getElementById("e_contact").value.trim();
      if (!contact) { showToast("Contact person is required.", false); return; }

      const type = document.querySelector('input[name="e_type"]:checked')?.value || "debtor";

      const payload = {
        companyName:   document.getElementById("e_company").value.trim(),
        contactPerson: contact,
        panVatGst:     document.getElementById("e_panvat").value.trim(),
        address:       document.getElementById("e_address").value.trim(),
        phone:         document.getElementById("e_phone").value.trim(),
        email:         document.getElementById("e_email").value.trim(),
        country:       document.getElementById("e_country").value,
        type,
      };

      try {
        const res = await axios.put(`${SUNDRY_API}/${id}`, payload, {
          headers: { "Content-Type": "application/json" }
        });
        if (res.data.success) {
          showToast("Entry updated! ✓");
          closeEditModal();
          currentEntry = res.data.data;
          renderDetail(res.data.data);
        } else {
          showToast(res.data.message || "Failed to update.", false);
        }
      } catch { showToast("Error updating entry.", false); }
    }

    // ── TOAST ─────────────────────────────────────
    function showToast(msg, success = true) {
      const e = document.querySelector(".toast"); if (e) e.remove();
      const t = document.createElement("div");
      t.className = `toast ${success ? "toast-success" : "toast-error"}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    loadEntry();
  </script>
</body>
</html>
