<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundry Debtors & Creditors | ASA</title>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.replace("login.html");
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="shared-theme.css" />
  <style>
    .floating label { background: white; }
    .modal-box .floating label { background: white; }

    .radio-group {
      display: flex;
      gap: 12px;
    }
    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      color: #64748b;
      transition: all 0.18s;
      background: white;
      user-select: none;
    }
    .radio-option input[type="radio"] { display: none; }
    .radio-option.selected-debtor  { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    .radio-option.selected-creditor{ border-color: #16a34a; color: #16a34a; background: #f0fdf4; }
    .radio-option:hover { border-color: #94a3b8; }

    .badge-debtor   { background:#dbeafe; color:#1d4ed8; padding:2px 10px; border-radius:999px; font-size:0.75rem; font-weight:600; }
    .badge-creditor { background:#dcfce7; color:#15803d; padding:2px 10px; border-radius:999px; font-size:0.75rem; font-weight:600; }
  </style>
</head>

<body>
  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-3xl" style="color:#1e293b;">Sundry Debtors & Creditors</h2>
        <p id="sundryCount" class="text-sm mt-1" style="color:#64748b;">Loading...</p>
      </div>
      <button onclick="openModal()" class="btn-blue"><i class="fa fa-plus"></i> Add Entry</button>
    </div>

    <!-- Search Bar -->
    <div class="card p-4 mb-6 flex flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <input id="searchInput" type="text"
          placeholder="Search by company name or contact person..."
          class="input pr-10" oninput="handleSearch()" />
        <span class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#94a3b8;">🔍</span>
      </div>
      <button onclick="clearFilters()" class="btn-outline text-sm px-4">Clear</button>
    </div>

    <!-- Table -->
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table>
          <thead>
            <tr>
              <th>Company Name</th>
              <th>Contact Person</th>
              <th>Address</th>
              <th>Country</th>
              <th>Type</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sundryTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="hidden text-center py-16">
        <p class="text-4xl mb-3">🏢</p>
        <p style="color:#64748b;">No entries found.</p>
        <button onclick="openModal()" class="btn-blue mt-4 text-sm">Add your first entry</button>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════
       ADD MODAL
  ════════════════════════════════════════ -->
  <div id="addModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl" style="color:#1e293b;">Add Entry</h3>
        <button onclick="closeModal()"
          style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">✕</button>
      </div>

      <div class="space-y-4">

        <!-- Type -->
        <p class="section-title">Entry Type *</p>
        <div class="radio-group" id="m_typeGroup">
          <label class="radio-option selected-debtor" id="m_label_debtor">
            <input type="radio" name="m_type" value="debtor" checked onchange="onTypeChange('m')" />
            <i class="fa fa-arrow-down"></i> Debtor
          </label>
          <label class="radio-option" id="m_label_creditor">
            <input type="radio" name="m_type" value="creditor" onchange="onTypeChange('m')" />
            <i class="fa fa-arrow-up"></i> Creditor
          </label>
        </div>

        <!-- Company & Contact -->
        <p class="section-title mt-2">Company Information</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="floating col-span-2">
            <input class="input" id="m_company" type="text" placeholder=" " />
            <label>Company Name</label>
          </div>
          <div class="floating">
            <input class="input" id="m_contact" type="text" placeholder=" " />
            <label>Contact Person *</label>
          </div>
          <div class="floating">
            <input class="input" id="m_panvat" type="text" placeholder=" " />
            <label>PAN / VAT / GST</label>
          </div>
          <div class="floating col-span-2">
            <input class="input" id="m_address" type="text" placeholder=" " />
            <label>Address</label>
          </div>
          <div class="floating">
            <input class="input" id="m_phone" type="number" placeholder=" " />
            <label>Contact Number</label>
          </div>
          <div class="floating">
            <input class="input" id="m_email" type="email" placeholder=" " />
            <label>Email</label>
          </div>
          <div class="floating">
            <select class="input" id="m_country" onchange="this.classList.add('has-value')">
              <option value="" disabled selected hidden></option>
              <option>Nepal</option>
              <option>India</option>
              <option>Bhutan</option>
            </select>
            <label>Country</label>
          </div>
        </div>

        <div class="flex gap-3 pt-4">
          <button onclick="submitSundry()" class="btn-blue flex-1">
            <i class="fa fa-save"></i> Save Entry
          </button>
          <button onclick="closeModal()" class="btn-outline flex-1">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const SUNDRY_API = "http://localhost:5000/api/sundry";
    let searchTimeout = null;

    document.addEventListener("DOMContentLoaded", () => fetchSundry());

    // ── RADIO STYLE ──────────────────────────────
    function onTypeChange(prefix) {
      const val = document.querySelector(`input[name="${prefix}_type"]:checked`)?.value;
      const lD  = document.getElementById(`${prefix}_label_debtor`);
      const lC  = document.getElementById(`${prefix}_label_creditor`);
      lD.className = "radio-option" + (val === "debtor"   ? " selected-debtor"   : "");
      lC.className = "radio-option" + (val === "creditor" ? " selected-creditor" : "");
    }

    // ── FETCH ─────────────────────────────────────
    async function fetchSundry(search = "") {
      try {
        showSkeletons();
        let url = SUNDRY_API;
        if (search) url += `?search=${encodeURIComponent(search)}`;
        const res  = await fetch(url);
        const data = await res.json();
        if (data.success) renderTable(data.data);
      } catch { showToast("Failed to load entries.", false); }
    }

    // ── RENDER ────────────────────────────────────
    function renderTable(list) {
      const tbody = document.getElementById("sundryTableBody");
      const empty = document.getElementById("emptyState");
      document.getElementById("sundryCount").textContent =
        `${list.length} entr${list.length !== 1 ? "ies" : "y"} found`;

      if (list.length === 0) {
        tbody.innerHTML = "";
        empty.classList.remove("hidden");
        return;
      }
      empty.classList.add("hidden");
      tbody.innerHTML = list.map(s => `<tr>
        <td style="font-weight:500;">${s.companyName || "—"}</td>
        <td>${s.contactPerson}</td>
        <td>${s.address || "—"}</td>
        <td>${s.country || "—"}</td>
        <td>
          <span class="badge-${s.type}">
            <i class="fa fa-arrow-${s.type === 'debtor' ? 'down' : 'up'} mr-1"></i>
            ${s.type === "debtor" ? "Debtor" : "Creditor"}
          </span>
        </td>
        <td>
          <a href="sundry-detail.html?id=${s._id}" class="btn-outline text-xs px-3 py-1">
            Edit <i class="fa fa-arrow-right"></i>
          </a>
        </td>
      </tr>`).join("");
    }

    function showSkeletons() {
      document.getElementById("sundryTableBody").innerHTML =
        Array(5).fill(
          `<tr>${Array(6).fill(`<td><div class="skeleton h-4 w-20"></div></td>`).join("")}</tr>`
        ).join("");
    }

    // ── SEARCH ────────────────────────────────────
    function handleSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() =>
        fetchSundry(document.getElementById("searchInput").value.trim()), 400);
    }

    function clearFilters() {
      document.getElementById("searchInput").value = "";
      fetchSundry();
    }

    // ── MODAL ─────────────────────────────────────
    function openModal() {
      resetForm();
      document.getElementById("addModal").classList.add("active");
    }
    function closeModal() { document.getElementById("addModal").classList.remove("active"); }
    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById("addModal")) closeModal();
    }

    function resetForm() {
      ["m_company","m_contact","m_panvat","m_address","m_phone","m_email"].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = "";
      });
      document.getElementById("m_country").value = "";
      // Reset radio to debtor
      document.querySelector('input[name="m_type"][value="debtor"]').checked = true;
      onTypeChange("m");
    }

    // ── SUBMIT ────────────────────────────────────
    async function submitSundry() {
      const contact = document.getElementById("m_contact").value.trim();
      if (!contact) { showToast("Contact person is required.", false); return; }

      const type = document.querySelector('input[name="m_type"]:checked')?.value || "debtor";

      const payload = {
        companyName:   document.getElementById("m_company").value.trim(),
        contactPerson: contact,
        panVatGst:     document.getElementById("m_panvat").value.trim(),
        address:       document.getElementById("m_address").value.trim(),
        phone:         document.getElementById("m_phone").value.trim(),
        email:         document.getElementById("m_email").value.trim(),
        country:       document.getElementById("m_country").value,
        type,
      };

      try {
        const res = await axios.post(SUNDRY_API, payload, {
          headers: { "Content-Type": "application/json" }
        });
        if (res.data.success) {
          showToast("Entry saved! ✓");
          closeModal();
          fetchSundry();
        } else {
          showToast(res.data.message || "Failed to save.", false);
        }
      } catch { showToast("Error saving entry.", false); }
    }

    // ── TOAST ─────────────────────────────────────
    function showToast(msg, success = true) {
      const e = document.querySelector(".toast"); if (e) e.remove();
      const t = document.createElement("div");
      t.className = `toast ${success ? "toast-success" : "toast-error"}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
