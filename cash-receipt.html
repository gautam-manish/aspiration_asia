<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cash Receipts | Hotel Collection</title>
    <script>if (!localStorage.getItem("token")) window.location.replace("login.html");</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="shared-theme.css" />
    <style>
        .floating label {
            background: white;
        }

        .modal-box .floating label {
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: #eff6ff;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.78rem;
            color: #2563eb;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            font-size: 0.88rem;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .badge {
            display: inline-block;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.75rem;
            color: #2563eb;
            font-weight: 500;
        }

        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ── Receipt Preview (print) ── */
        .receipt-wrap {
            max-width: 680px;
            margin: 0 auto;
            font-family: Arial, sans-serif;
        }

        .receipt-box {
            border: 2px solid #1e293b;
            border-radius: 5px;
            padding: 24px 28px;
        }

        .receipt-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .receipt-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .receipt-company-name {
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .receipt-company-detail {
            font-size: 0.78rem;
            color: #475569;
            line-height: 1.6;
        }

        .receipt-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .receipt-rno {
            font-size: 0.88rem;
            color: #1e293b;
        }

        .receipt-rno span {
            font-weight: 700;
            color: #dc2626;
            font-size: 1rem;
        }

        .receipt-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            text-decoration: underline;
            letter-spacing: 0.05em;
        }

        .receipt-date {
            font-size: 0.88rem;
            color: #1e293b;
        }

        .receipt-date span {
            font-weight: 600;
        }

        .receipt-body {
            font-size: 0.9rem;
            color: #1e293b;
            line-height: 2;
            margin-bottom: 20px;
        }

        .receipt-body .dotted {
            border-bottom: 1px dotted #475569;
            display: inline;
            padding: 0 4px;
        }

        .receipt-checkboxes {
            display: flex;
            gap: 24px;
            margin-top: 12px;
            align-items: center;
        }

        .receipt-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
            color: #1e293b;
        }

        .receipt-checkbox .box {
            width: 16px;
            height: 16px;
            border: 1px solid #1e293b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .receipt-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .receipt-amount-box {
            background: #1e293b;
            color: white;
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }


        .receipt-computer-msg {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 12px;
            font-style: italic;
        }

        /* Print */
        @media print {

            html,
            body {
                height: auto;
                margin: 0;
                padding: 0;
            }

            body * {
                visibility: hidden;
            }

            #printArea,
            #printArea * {
                visibility: visible;
            }

            #printArea {
                position: static;
                /* مهم: remove absolute */
                width: 100%;
                margin: 0;
                padding: 0;
            }

            .receipt-wrap {
                margin: 0 auto;
                page-break-inside: avoid;
            }

            .receipt-box {
                border: 1px solid #000;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <main class="max-w-5xl mx-auto px-6 py-10">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
            <div>
                <h2 class="text-3xl" style="color:#1e293b;font-family:'Playfair Display',serif;">Cash Receipts</h2>
                <p id="receiptCount" class="text-sm mt-1" style="color:#64748b;">Loading...</p>
            </div>
            <button onclick="openAddModal()" class="btn-blue"><i class="fa fa-plus"></i> Add Receipt</button>
        </div>

        <!-- Search + Filter -->
        <div class="card p-4 mb-6 flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <input id="searchInput" type="text" placeholder="Search by name..." class="input pr-10"
                    oninput="handleSearch()" />
                <span class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#94a3b8;">🔍</span>
            </div>
            <input id="dateFilter" type="date" class="input sm:w-48" onchange="handleSearch()" />
            <button onclick="clearFilters()" class="btn-outline text-sm px-4">Clear</button>
        </div>

        <!-- Table -->
        <div class="card overflow-hidden">
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>SN</th>
                            <th>Reg. No.</th>
                            <th>Name</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="receiptTableBody"></tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden text-center py-16">
                <p class="text-4xl mb-3">🧾</p>
                <p style="color:#64748b;">No cash receipts found.</p>
                <button onclick="openAddModal()" class="btn-blue mt-4 text-sm">Add your first receipt</button>
            </div>
        </div>

    </main>

    <!-- ── ADD MODAL ── -->
    <div id="addModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl" style="color:#1e293b;font-family:'Playfair Display',serif;">Add Cash Receipt</h3>
                <button onclick="closeAddModal()"
                    style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">✕</button>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <!-- <div class="floating">
          <input class="input" id="f_regNo" type="text" placeholder=" "/>
          <label>Registration Number</label>
        </div> -->
                    <div class="floating">
                        <input class="input" id="f_date" type="date" />
                        <label>Date</label>
                    </div>
                </div>
                <div class="floating">
                    <input class="input" id="f_name" type="text" placeholder=" " />
                    <label>Name *</label>
                </div>
                <div class="floating">
                    <input class="input" id="f_amount" type="number" placeholder=" " min="0"
                        oninput="updateAmountWords()" />
                    <label>Amount (Rs.) *</label>
                </div>
                <div class="floating">
                    <input class="input" id="f_amountWords" type="text" placeholder=" " readonly
                        style="background:#f8fafc;color:#64748b;" />
                    <label>Amount in Words (auto)</label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="floating">
                        <input class="input" id="f_chequeNo" type="text" placeholder=" " />
                        <label>Cash / Cheque No.</label>
                    </div>
                    <div class="floating">
                        <input class="input" id="f_bank" type="text" placeholder=" " />
                        <label>Bank</label>
                    </div>
                </div>

                <!-- Payment Type Checkboxes -->
                <div class="floating">
                    <input class="input" id="f_paymentType" type="text" placeholder=" " />
                    <label>Payment Against For</label>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="saveReceipt()" class="btn-blue flex-1"><i class="fa fa-save"></i> Save
                        Receipt</button>
                    <button onclick="closeAddModal()" class="btn-outline flex-1">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── PRINT PREVIEW MODAL ── -->
    <div id="previewModal" class="modal-overlay" onclick="closePreviewOnOverlay(event)">
        <div class="modal-box" style="max-width:740px;">
            <div class="flex items-center justify-between mb-4 no-print">
                <h3 class="text-lg" style="color:#1e293b;font-family:'Playfair Display',serif;">Receipt Preview</h3>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="btn-green text-sm"><i class="fa fa-print"></i> Print /
                        PDF</button>
                    <button onclick="closePreviewModal()"
                        style="color:#94a3b8;font-size:1.5rem;background:none;border:none;cursor:pointer;">✕</button>
                </div>
            </div>
            <div id="printArea">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script>
        const API = "http://localhost:5000/api/cash-receipts";
        let searchTimeout = null;
        let allReceipts = [];

        // ── Amount to Words ───────────────────────────
        const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine",
            "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
        const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

        function numToWords(n) {
            n = Math.floor(Number(n));
            if (!n || n === 0) return "";
            if (n < 20) return ones[n];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? " " + ones[n % 10] : "");
            if (n < 1000) return ones[Math.floor(n / 100)] + " Hundred" + (n % 100 ? " " + numToWords(n % 100) : "");
            if (n < 100000) return numToWords(Math.floor(n / 1000)) + " Thousand" + (n % 1000 ? " " + numToWords(n % 1000) : "");
            if (n < 10000000) return numToWords(Math.floor(n / 100000)) + " Lakh" + (n % 100000 ? " " + numToWords(n % 100000) : "");
            return numToWords(Math.floor(n / 10000000)) + " Crore" + (n % 10000000 ? " " + numToWords(n % 10000000) : "");
        }

        function updateAmountWords() {
            const amt = document.getElementById("f_amount").value;
            const words = amt ? numToWords(amt) + " Rupees Only" : "";
            document.getElementById("f_amountWords").value = words;
        }

        // ── Fetch Receipts ────────────────────────────
        async function fetchReceipts(search = "", date = "") {
            try {
                showSkeletons();
                let url = API;
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (date) params.push(`date=${date}`);
                if (params.length) url += "?" + params.join("&");
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) renderTable(data.data);
            } catch { showToast("Failed to load receipts.", false); }
        }

        function renderTable(receipts) {
            const tbody = document.getElementById("receiptTableBody");
            const empty = document.getElementById("emptyState");
            document.getElementById("receiptCount").textContent =
                `${receipts.length} receipt${receipts.length !== 1 ? "s" : ""} found`;

            if (receipts.length === 0) { tbody.innerHTML = ""; empty.classList.remove("hidden"); return; }
            empty.classList.add("hidden");

            tbody.innerHTML = receipts.map((r, i) => {
                const date = r.date
                    ? new Date(r.date + "T00:00:00").toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })
                    : new Date(r.createdAt).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
                const amt = Number(r.amount || 0).toLocaleString("en-IN", { minimumFractionDigits: 2 });
                return `
        <tr>
          <td style="color:#94a3b8;font-size:0.8rem;">${i + 1}</td>
          <td><span class="badge">${r.registrationNumber || "—"}</span></td>
          <td style="font-weight:500;">${r.name}</td>
          <td style="color:#64748b;">${date}</td>
          <td style="font-weight:700;">Rs. ${amt}</td>
          <td>
            <div style="display:flex;gap:8px;">
              <button onclick="viewReceipt('${r._id}')" class="btn-outline" style="font-size:0.78rem;padding:4px 12px;">
                <i class="fa fa-eye"></i> View
              </button>
              <button onclick="deleteReceipt('${r._id}')" style="border:1px solid #fecaca;color:#ef4444;border-radius:6px;padding:4px 10px;font-size:0.78rem;background:transparent;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#ef4444';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='#ef4444'">
                <i class="fa fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>`;
            }).join("");
        }

        function showSkeletons() {
            document.getElementById("receiptTableBody").innerHTML = Array(5).fill(`
      <tr>${Array(6).fill(`<td><div class="skeleton h-4 w-24"></div></td>`).join("")}</tr>
    `).join("");
        }

        // ── Search ────────────────────────────────────
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchReceipts(
                    document.getElementById("searchInput").value.trim(),
                    document.getElementById("dateFilter").value
                );
            }, 400);
        }

        function clearFilters() {
            document.getElementById("searchInput").value = "";
            document.getElementById("dateFilter").value = "";
            fetchReceipts();
        }

        // ── Add Modal ─────────────────────────────────
        function openAddModal() {
            // document.getElementById("f_regNo").value       = "";
            document.getElementById("f_date").value = new Date().toISOString().split("T")[0];
            document.getElementById("f_name").value = "";
            document.getElementById("f_amount").value = "";
            document.getElementById("f_amountWords").value = "";
            document.getElementById("f_chequeNo").value = "";
            document.getElementById("f_bank").value = "";
            // document.querySelector('input[name="paymentType"][value="Guest Ledger"]').checked = true;
            document.getElementById("f_paymentType").value = "";
            document.getElementById("addModal").classList.add("active");
        }

        function closeAddModal() { document.getElementById("addModal").classList.remove("active"); }
        function closeModalOnOverlay(e) { if (e.target === document.getElementById("addModal")) closeAddModal(); }

        // ── Save Receipt ──────────────────────────────
        async function saveReceipt() {
            const name = document.getElementById("f_name").value.trim();
            const amount = document.getElementById("f_amount").value;
            if (!name) { showToast("Please enter a name.", false); return; }
            if (!amount) { showToast("Please enter an amount.", false); return; }

            // const paymentType = document.querySelector('input[name="paymentType"]:checked')?.value || "Guest Ledger";

            const paymentType = document.getElementById("f_paymentType").value.trim();
            const payload = {
                //   registrationNumber: document.getElementById("f_regNo").value.trim(),
                date: document.getElementById("f_date").value,
                name,
                amount: Number(amount),
                amountInWords: document.getElementById("f_amountWords").value,
                cashChequeNo: document.getElementById("f_chequeNo").value.trim(),
                bank: document.getElementById("f_bank").value.trim(),
                paymentType,
            };

            try {
                const res = await axios.post(API, payload, { headers: { "Content-Type": "application/json" } });
                if (res.data.success) {
                    showToast("Receipt saved! ✓");
                    closeAddModal();
                    fetchReceipts();
                } else showToast(res.data.message, false);
            } catch (err) { showToast("Error saving receipt.", false); console.log(err.response?.data); }
        }

        // ── View / Print Receipt ──────────────────────
        async function viewReceipt(id) {
            try {
                const res = await fetch(`${API}/${id}`);
                const data = await res.json();
                if (data.success) renderReceiptPreview(data.data);
                else showToast("Failed to load receipt.", false);
            } catch { showToast("Error loading receipt.", false); }
        }

        function renderReceiptPreview(r) {
            const date = r.date
                ? new Date(r.date + "T00:00:00").toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" })
                : new Date(r.createdAt).toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });

            const amt = Number(r.amount || 0).toLocaleString("en-IN", { minimumFractionDigits: 2 });

            const payTypes = ["Guest Ledger", "City Ledger", "Other"];

            document.getElementById("printArea").innerHTML = `
      <div class="receipt-wrap">
        <div class="receipt-box">

          <!-- Header -->
          <div class="receipt-header">
            <img src="https://i.ibb.co/bRJr7nNM/images.png" class="receipt-logo"/>
            <div>
              <div class="receipt-company-name">Aspiration Asia Trekking and Expedition Pvt Ltd.</div>
              <div class="receipt-company-detail">
                Bhaktapur Durbar Square, Kathmandu, Nepal<br/>
                Tel: +977-982761738 / +977-9851021924<br/>
                Email: sales@aspirationasia.com<br/>
                Web: www.aspirationasia.com
              </div>
            </div>
          </div>

          <!-- Meta: R.No | CASH RECEIPT | Date -->
          <div class="receipt-meta">
            <div class="receipt-rno">R.No.: <span>${r.registrationNumber || "—"}</span></div>
            <div class="receipt-title">CASH RECEIPT</div>
            <div class="receipt-date">Date: <span>${date}</span></div>
          </div>

          <!-- Body -->
          <div class="receipt-body">
            Received with thanks from <span class="dotted">&nbsp;${r.name}&nbsp;</span>
            a sum of in words <span class="dotted">&nbsp;${r.amountInWords || ""}&nbsp;</span>
            <br/>
            Cash/Cheque No.: <span class="dotted">&nbsp;${r.cashChequeNo || ""}&nbsp;</span>
            &nbsp;&nbsp; Bank <span class="dotted">&nbsp;${r.bank || ""}&nbsp;</span>
            as Payment Against For <span class="dotted">&nbsp;${r.paymentType || ""}&nbsp;</span>
           

           
          <!-- Footer -->
          <div class="receipt-footer">
            <div class="receipt-amount-box">
              Rs. ${amt}/-
            </div>
          </div>

        </div>
        </div>

        <!-- Computer generated msg -->
        <div class="receipt-computer-msg">
          This is computer generated voucher and doesn't need signature.
        </div>
      </div>
    `;

            document.getElementById("previewModal").classList.add("active");
        }

        function closePreviewModal() { document.getElementById("previewModal").classList.remove("active"); }
        function closePreviewOnOverlay(e) { if (e.target === document.getElementById("previewModal")) closePreviewModal(); }

        // ── Delete ────────────────────────────────────
        async function deleteReceipt(id) {
            if (!confirm("Are you sure you want to delete this receipt?")) return;
            try {
                const res = await fetch(`${API}/${id}`, { method: "DELETE" });
                const data = await res.json();
                if (data.success) { showToast("Receipt deleted! ✓"); fetchReceipts(); }
                else showToast(data.message, false);
            } catch { showToast("Error deleting receipt.", false); }
        }

        // ── Toast ─────────────────────────────────────
        function showToast(msg, success = true) {
            const e = document.querySelector(".toast"); if (e) e.remove();
            const t = document.createElement("div");
            t.className = `toast ${success ? "toast-success" : "toast-error"}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ── Init ──────────────────────────────────────
        fetchReceipts();
    </script>
</body>

</html>
